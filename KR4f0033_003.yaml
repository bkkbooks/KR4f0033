買帖花邊市尋僧竹外峯何年問箋注特訪鄭司農送景文岩二首何用詩名大新城每向人輒謬云吳子詩名甚大心感知已之言艱難老病餘且看三日雪省問五車書君復雪中去誰堪慰索居春風倘南下同饌浙江魚蚤嵗過吳㑹蘇州又秀州驚心三十載發興欲重遊老愛鴛鴦水貧貪粳稻秋文翁新政好憑語寄東流謂佟青士使君送董禹揚時攜內往故有末句愛爾江花閣新文錦不如久傳繁露學方奏治安書且共一尊酒還遲雙鯉魚前山如黛色都擁七香車飲孟氏園二首録一首衆峯在林表宛然賔主同竹間流水過花外石闌通客語鳥聲寂雲開山徑空名園兼勝侣十倍說墻東答友四首録三首朋好日以逺村墟甘隱淪山中拾橡客河上緯蕭人之子能相訪盤餐愧未陳更聞欲攜手仍共結芳鄰昨日勞書札瓊瑶紛見貽出入在懷袖尚有虬龍姿我欲急裁答遲回無令辭折梅風雪裏聊以寄相思却憶陪遊日聫鑣澗水陽雲中見雞犬世外有耕桑帶雪溪藤古經冬水荇長晚來酣白酒即此是陶唐懷儼若念爾佳公子將為萬里行艱難終意氣清白益詩名衣著桄榔雨舟看海嶠晴鄉書何處達無雁共南征送韓維藩入都二首録一首東風難遽别車馬若為攀寧戀鶯花節終還鵷鷺班紅傾蒲阪酒青入薊門山但看賢豪客從來幾箇閒越女憔悴浦中蓮低聲問逺天裁衣拋白紵漬淚掩紅綿蜥蜴盤深字真珠寄短篇年年花事近空立苧蘿烟送友春風舊山好君行偏此時尊前言未盡林外馬長嘶芳草關門道垂楊令尹祠江南梅正發莫惜寄南枝柬鄉寧大令張公為政萬山裏艱虞況七年百家租賦苦千仞訟庭懸世德傳司馬風流儼昔賢題詩兼種竹日日石堂偏雲中寺天半雲中寺四山皆白雲我來雲際宿却憶雲中君塔影當晴出濤聲入夜聞此中有猿鶴莫勒北山文宿楊司空園看竹宿竹裏主人都不知蜻蜓上簾幕鸂鶒飛軒墀荷葉尚欹岸寒花方著枝鐘聲催酒醒燈火四更時文選樓彈指蕭梁代傷心文選樓秋衾泣銅輦春殿狎江鷗朱雀圍何急青絲恨不休由來膺玉厯未可仗金甌天柱峰空谷良非逺招攜亦自豪轉忘千徑曲陡見一峯髙峻欲卑三詔峰下有三詔亭尊將俯六鼇崇巖真可仰一為薦溪毛東瀑布東嶺鬱葱蘢逶迤下玉龍香巖通一線雲窟簇諸峯石髓飛逾冽天漿挹更濃捫蘿發長嘯初日看髙舂西瀑布坐卧西巖下層氷落絳崖三春常夢雨十月忽聞雷到眼雲光近當頭鴈語哀何須浣氷雪姑射有靈胎拜司空遺像緬邈先型逺皈依舊德尊凍禽窺石閣野鹿到柴門赤舄風何古黃綾詔尚存像著赤舄有童子捧詔侍側後凋見松柏千載著靈根公祠前有柏生石上次靜海縣郭依春水牽船過夕陽行行芳草路不斷梨花香雲氣濕垂雨風聲柔剪桑低徊雙燕子有夢入雕梁題溪館春鳥鳴復飛春烟滿翠微人家臨曲水齊閣住清暉樵客晚相語漁人行未歸溪山誠可樂方製水田衣次清化即景白鷺明秋水涼風吹葛巾溪邊收稻客栁下織簾人野饌芋魁熟風樓蚱蜢親十年來往路重問濁漳濵張兵馬招踏青春雪融沙岸庭梅曉笛中有情堤草緑無意海雲紅酒榼鄉人語帆檣異國風羅浮花信早天際幾歸鴻廣陵留别孫無言黃山歸何日猿鳥皆望君我向中條去花巖㺯白雲浦沙晴照舫江樹曉含曛握手不堪别悠悠鸞鶴羣途次懷歸華山覔諸隱居未遂金庭隱嘗懷石户農幾時結茅屋日坐青芙蓉夢歇關門雨心空嶽寺鐘白雲最相識來往宿簷松還中條别鑑文師屢過齊厨飯猶分般若經有機酬鈍滯無諍樂沈冥潮夢關門白山迎驛路青重來應一笑大海總浮萍飲丁荷峰參軍署齊時同元彥笨山芰梁部山諸子有道且薄宦悠然滄海情賔筵交雨氣官舍傍濤聲天上佳公子江東老步兵登樓仍半醉詩思各縱橫寄友荏苒三年别相思豈世情尋僧同雨出載酒並船行河上青蘋老林間白露生蓮花五千仞待爾躡崢嶸初聞蟬作客知秋早何須爾更鳴從今多見鴈此後少聞鶯兩岸如三疊千林共一聲鄉關那堪憶回首緑楊平冠陽雨後川原氣候變清秋草木長驟雨生溝水溪田何茫茫濃雲濕西嶺輕泥霑條桑坐息遲同客長堤櫸栁香八月八月苦逆旅白露青棠生鄉國渺何處西風空復情斷鴻淒塞影落葉下寒聲城上羽林騎紛紛曉角鳴懷翁山時方歸省暫攜家白下江關成失路愁對江花繁數欲返京口思君在白門可回萊子棹幾遇信陵恩咫尺不能達臨風無片言題楞伽出塞圖出關塞草白立馬心獨傷秋風吹雁影天際正茫茫豈念衣裳薄還驚鬢髮蒼金閨千里月中夜拂流黃送玉如之蜀四首録一首之子勞行役迢遙古益州城髙通白帝峽急避黃牛茶向䝉山採魚從丙穴求西風豈搖落清絶荔枝樓東郭即事雲上曉山翠平蕪野望懸鳥啼藏竹寺鹿飲雜花泉題字經樓側燒鐺錦石邊誰家作寒食林外有風鳶晚集玉礎傍城小園小徑依城角羊求路漸迷花聞譙鼓暗竹傍女墻低夜雨人三箇秋風菜一畦開門仍貰酒莫惜踏深泥走筆訊杜又振上國相逢日春風蕙草香不知故園竹今復幾竿長雪盡娥皇廟鶯飛鄭谷莊閒時擬相過細話酒壚傍初辭家行中條山下戚戚正寒月胡為今逺行悲風千樹肅殘雪幾峰晴已覺懷兄弟初知念友生惟餘天外雁似我作南征丹陽晚泊日落長流靜停舟望毗陵天寒聞戍鼓風定識漁燈故國渺千里煙波應萬層愁心似江水日與晚潮增再逢王阮亭先生於江浦悠悠近十年飄泊隨風煙每與世人忤益思夫子賢相逢江浦上歎息夕陽邊何日成歸計春山有薄田再贈吉協和四首經年如久别千里喜君來有約仍聫榻無心更築臺青燈同不寐白髮兩相催為問東山上桃花幾樹開念我如飢渴逢君問急難千秋心如許半夜影相看莫擊荆卿筑終彈貢禹冠綈袍無可贈嗟爾敝裘寒相逢意不盡相送復如何匹馬龜䝉道千山雨雪多聞雞余起舞扣角爾行歌明嵗薰風夜重來醉薜蘿又作天涯别那無十日歡平千從此去易水為君寒病覺世情薄老知交道難今朝斗酒意來夕夢中看讀傅公他詩感書其後苦節孤生竹哀絃寡女詩感君迸淚處是我斷腸時不死翻成恨多愁只益悲長飢忍薇蕨髙義北堂知平水感懷髙栁下鳴禽春城二月隂新鶯聽處滑芳草望中深花雨憂時淚山雲出世心不知煙海上誰㑹作黃金石門三首盤回溪路長低草見牛羊風急山藤折崖崩石髓香鵾雞舞難定孺子歌未央斟酌松雲裏寒花近石牀拂袖動雲根濤聲過石門野花紅覆路髙栁碧連村鳥道盤危棧蟻丘倒客樽茱茰莫漫插終是惜黃昏犬吠夜如豹風光小輞川林回烟續斷月上水淪漣蟋蟀秋仍語鵁鶄冷未眠不須愁輾轉漸看曉珠圓虞鄉二首録一首洗馬村南路王官紫翠重人家依谷口樵徑入髙峰竹暗千竿雨泉飛萬壑風司空亭榭在臨望思無窮送張無競還河中婚並轡宜陽道欣聞君又還橋仍清潁水花尚陸渾山園客收蠶箔仙人贈指環吹簫長夏日唐韻出人間謁永樂宫二首久說雙珠樹今來永樂宫雲霞生户牖日月近簾櫳扶木千年宅崑崙萬里風刀圭如可覔丹火夕陽紅仙翁果何處松檜但依然劍氣常通峽鶴聲每在天罘罳丹鳳攫槖籥白龍纒晚愛西峰月清光溜石泉倚檻倚檻白雲外推窗紅樹邊年華猶浩蕩風景幾秋千海霧隨風濶江沙裹浪圓鳴鳩苦相喚惆悵負春田汾陽館殘雪明髙嶺春沙引亂流栁遮郭外驛花映水邊樓風土乖鄉語年華繫客愁桑田誰負畚惆悵聽鳴鳩蓮洋詩鈔卷三
