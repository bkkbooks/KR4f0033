body:
  text: 蓮洋詩鈔卷三蒲州吳雯撰五律永樂蚤發蚤發招賢里涼雲解鬱蒸河聲過雷首雨氣下風陵鳳嘴三春麥龍頭五月氷蓮花天外落千仞碧崚嶒卧佛寺石壁留蒼蘚秋風紺殿隂殘僧朝閉户山鳥暮窺林老樹飽氷雪白雲橫古今津梁本無倦聊示靜居心涉澠清澠方朝涉人家半薜蘿溪光迎客淺山翠拂衣多霸業餘荒壘盟臺俯逝波誰能瞻紫氣函谷等閒過宿孫家灣中酒翻成病長謡祗益哀一燈殘夜後百感壯年來洛水芝難採嵩陽桂未開愁心與歸夢却傍赫連臺讀張中丞睢陽遺事歎憤不禁遂書紙尾二首板蕩中原甚江淮有義旌一身持衆議百戰抗孤城自合回天地何須計死生浮圖留半箭遺恨賀蘭兵廷議真堪痛精英幸不孤當時猶以食人為過幸賴張建封李翰等持議乃定只今留廟食差可慰雄圖象服褒申國金吾拜亞夫猶嫌崇贈恤不到陸家姑中丞有姊嫁陸氏虢王巨走臨淮姊遮說勸勿行後補縫行問贊中丞軍軍中號陸家姑先事被害中丞妻贈申國子拜金吾大將軍贈張西木二首録一首倦鳥愁千里欣逢嘉樹隂晚來望明月清影在髙林散坐仗杯酒涼風吹客襟蘇門追往事遙聽鳳鸞音陪五崖先生宿白茅寺七首録四首盤馬入蒼翠平橋林影斜白茅何代寺黃葉幾人家石井尚生乳寒瓜猶帶花晚來添紫氣分得赤城霞夜月下涼露空明映石根更教捉坐席還與集南軒洞濕龍歸峽風腥虎到門何曽纍機事終得暢清言未得山中去看山且住山階前雙樹老户外一峰閒客散但孤坐花深方閉關胎禽能警夜一唳竹林間林白四山曉山中難久留王程不相待客路幾時休紅樹引千騎朱旗導八騶轉憐猿鶴夢剎那隔閻浮雙老夫婦生日又一首珠樹雙棲鶴無憂到嵗寒黔婁拙夫壻德耀古衣冠井臼人間世雞豚竈下丹林中行樂處嬰奼入仙壇不寐不寐兼秋雨寒宵更漏重白頭愁易得青眼世難逢蛛網山堂藥烏啼使院松西風動鈴索處處損芙蓉寄向書友曽聞向始平能注南華經之子真苗裔江山發性靈寒蛟終謝餌老鶴不梳翎載酒鶯花節長吟入洞庭汴樓喜春三首蕙風乍披閣栁煙將著扉愁應隨臘去喜定逐春歸官驛江梅落鵰梁海燕飛玉溪三月路載酒莫相違連日北樓醉人傳又立春柳拖新苑水花掃故宫塵鶴醒三更夢鵬摶萬里身相拌郢中客同去採江蘋生菜細堪嚼玉壺清更陳鳴箏樓上客挾彈栁邊人寺塔留殘偈宫鈿感故塵當年歌舞地幾處鎖寒筠有憶二首憶爾提紅燭相尋半玉溪紫叉屋南北紅袖澗東西咏雪當鴉鬢行春過燕泥避風臺畔醉裙皺落文犀昨夜月明好清光萬里同階閒人少睡閣迥燭無風酒渴三更後心空四照中南來尚烏鵲飛過㦸門東少林早發初地始一宿勞塵愁未閒鐘鳴少林寺日上轘轅關度嶺見青鳥沿溪拋白環藤蘿猶在眼惆悵欲忘還送里人歸中條好山色君歸春雨時遙看汳河栁盡濕煙中絲飲馬崑崙水聽鶯𤣥女祠愁心對芳草豈但發相思留王孟穀游風穴風穴何年寺傳聞水石間雲中千樹密溪上幾僧閒花信宜攜酒春心且看山休言涉魚齒涷雨損朱顔奉寄吳薗次先生山榛隰有苓十載念儀型柳惲真才子嚴光是客星人歸黃蘗澗春散白蘋汀老向江湖裏新詩滿洞庭送宋牧仲先生出使贛州才子新銜命離筵且泛杯舟過章貢水人在鬱孤臺桂子經寒結薑花浥雨開春風歸雁後肯寄一枝梅送方山先生歸里營清義公葬事四首録一首一語即相許傾心誰似君千秋感知已百倍惜離羣拜闕辭青瑣還家掃白雲好看清義墓秋柏落紛紛賦得江嗚夜雨懸一夜短篷雨何人江上眠濕飛雲外雁夢醒峽中天便汲中泠水寧須桑苧泉濛濛沙岸蕨齊放小兒拳賦得明月照積雪尚覺餘寒在簷楹雪未消蟾光增皎潔清夢共蕭條一相何分别千山惟寂寥沈吟得佳句特許寫生綃送涓來先生歸江寧五首録三首夫子久入道即在簮紱間康濟願無盡塵勞思暫閒杯中建業水杖底秣陵山百鳥銜花處從今日往還句曲茅君隱棲霞江令居千秋尊道德百鍊悟空虛竟躡山中屐閒看江上漁等閒逢大藥不必是匡廬公廬山有革堂燕許文章大韋平門閥髙鄉心違楚水歸計且江臯拜闕辭龍尾承家有鳯毛方看庾開府清絶振波濤贈道者天半挹紅霞滄洲處處家仙經窺玉笥小妓遣蓮花渡海長騎鶴開山或種瓜青牛新有約一夜到流沙送黃俞邰奔母喪白門三首録一首微祿親應喜其如時命窮文章千卷拙雨雪一帆東山水悲涼外江花涕淚中傷心衣線斷忍見舊時縫奉題皓亭先生臯園五首録四首池館接城隂春風滿竹林靜看垂釣意未減富陽心雨過沙田白雲歸煙樹深忘機對鄰叟幾見訝朝簮鄰舍草堂近灌園同一泉白雲扶杖客芳草著書天家在桃花外心當緑水前東屯愁杜老錯買瀼西田招隱懷佳處幽尋此欲降鶯聲嘗到午鶴唳必聞雙山氣通三竺池流導浙江梅花仍作意故故入煙窗仲叔羈棲日山公把酒時林泉從此識花竹盡堪思野蔓纒青壁山禽下緑枝他時尋石路應得九峰疑次宿州三首録一首野水圍城郭寒濤疊女墻文章通上國姓氏隱他鄉夜月千峰雪晨風滿劍霜長歌人不識把酒托清狂秋夜聞絃索髙齊寂無事孤情良悠然何人理絃索聲韻明燈前繁響臨風急哀音入指圓曲終心不定空攪客中眠贈魏暗之千里俱為客同看海嶽春說詩狂未減驚座醉猶神花信連三月鶯聲漸四鄰秋風吹桂子仍作奪袍人懷古四首東方曼倩避世依金馬浮沈豹尾中借車心自壯割肉氣何雄學豈干時富財因取婦空堂堂責董偃真有大臣風陶元亮已分柴桑隱寧甘手板中詩憑甲子紀人是義熙雄濁酒東軒滿孤情大化空荆卿託同調髙咏入悲風李太白萬里峨嵋客長安酒肆中倚才輕婦寺為國愛英雄大藥求先得千金散後空只今思笑語猶似墮江風蘇東坡鄒陽前後世口語一生中忠信通天帝艱虞困鬼雄山前八部近海外萬緣空鸛雀蚊虻過都如電與風送王乃間之官平都讀書不為政勞生道亦非逺臨巴子國喜出華山畿飲澗猿公下銜花吉了飛平都舊仙窟日可對清暉白鸚鵡為宋牧仲僉憲賦怪爾生炎海天然素羽稀幾驚金粟夢故避雪山飛對月常憐影當花恐涴衣瑶林有仙客數與伴清暉憶棲巖寺最憶棲巖寺招涼有舊亭河流周郡白山勢入關青崖斷蜂留蜜松髙鶴墜翎盧師吾有約許共一函經送沈融谷之官來賓念爾粵西去愁心牽别筵逺為蠻縣宰誰重帝京篇嶺瘴昏榕樹江潮上蛤田耽幽閲巖壑莫讓昔人賢勝水觀音院小憩磴道交初地千山紫翠重晴雲消檻竹春雪覆巖松汲澗谷中得尋僧林下逢人家還幾里明月挂南峰賦得鴈寄魯少府一鴈汾陽郭寧知紫塞來花邊經斥堠雲表見樓臺尚有稻梁戀寧防矰繳猜春風知不逺歸及嶺南梅别龔明府返河中六月煩行役賢勞記往還紅辭溫室樹青過薊門山郡郭仍金犢河流尚玉環勸農容散騎十里盡潺湲送六皆還里二首秋到擾鄉夢驚聞君又歸迎舟花北笑送客雁南飛甘橘承筐嫩鱸魚入饌肥無人鑒辛苦莫下讀書幃痛飲無多日相思即嵗年江楓紅隔岸湖草碧連天自解吟詩句誰能贈酒錢梅花三竺路愁發早春邊阮亭先生得余長沙消息惓然見懷依韻和答無端衡嶽路辛苦近壺頭書達三千里人宗第一流江山迷去雁天地許歸舟已罷瀟湘客言愁尚欲愁寄石袍朱丈時逢其令子公琢都下輒有結鄰之約二首師表遺東國誰能似彥方傳經崇道德持世有文章庭樹生蘭玉天書下鳳凰琴聲猶髣佛何日一登堂公子千人傑相逢共玉京淵源識典則奇氣歎縱橫柳拂新豐酒花明客帳箏春來拜床下知有鹿門迎之津門遂留送陸天濤去住皆鴻爪淋漓酒滿襟東來瞻海氣南下憶江隂日暖魚蝦市霜髙橘柚林相思各珍重同保嵗寒心送周星公禮部出守南康四首録二首萬里敷文命歸無翡翠裝一麾辭北闕十月下南康問俗匡君側狂歌五老傍彭湖秋正闊波浪浩茫茫香爐吾最愛雲氣似香煙太守能清靜髙齊對晏眠更邀徐孺子同聽谷簾泉好在春明候騎牛西澗邊過大悲院訪世髙上人一鳥下蒼煙當門海日圓厨香貽笋蕨時張水部移茗饌往港白憶蒲蓮待索環中趣仍求世外緣拈花方一笑剛在早梅邊繡毬東風真狡獪挼粉傍亭幽銀碗盛珠母氷綃挽豹彄寒時霜結束暖處玉雕鎪莫作楊花認楊花散不收送諸五先還驪城三首東海移家久江南入夢多幾驚𤣥髮改無那壯心何嵗晚悲黃鵠春歸憶緑蘿不須愁往返處處有行窩有道人爭識相逢酒一杯精隨龍奮迅閒與鶴徘徊萬事老皆去百年春又來到家煙水緑幾處碧桃開最慕盧敖隱君今入杳冥年華憑野馬世事任浮萍海入桑田白山圍縣郭青王官遺舊谷吾亦結茅亭送吉咸寧還永樂二首得失皆何有春風羡爾歸喜看鄉樹近夢怯海潮飛白髮休窺鏡青山合息機丹臺逢玉女應綰六銖衣多愛損真寶長愁妨妙心早知讀損益終未去雲林之子能同調考槃方獨吟玉溪吾最戀重欲事幽尋送朱汗朱四首録二首同客海門久君行二月中登堂春酒熟入座雜花紅射雁宣房北垂綸衛水東却憐書卷內沈困幾英雄直道悲難合交情久益真猜嫌堪一笑德素自成鄰倉卒無通識彽徊見古人臨岐翻握手不覺淚沾巾對月明月生東海光輝寶鏡懸斜窺楊栁外低照藕花邊團扇輕相對髙樓剩獨眠蛟龍避涼夜安穩蚌珠圓寄楊樹滋先生二首録一首玉瓚盛仙醴金盤膾錦鱗巾箱藏五嶽一笑即千春貞白遙相望希夷近作鄰青泥仍幾襆舊惠感仁人集巢雲阿二首倍覺秋光好涼雲拂檻生當階松鼠落繞徑竹雞鳴酒向鄰翁乞碁看坐客爭莫貪髙卧久花下促題名一雙青鳯凰搖尾下山堂正有梧桐樹垂隂十畝長流雲晴卷雪飛瀑晝生涼不住巖花落還為掃石床春日過訪五先遂呈養五山人二首録一首地僻心逾靜城東舊草堂下簾深拜佛掃地自焚香峰勢側當户花枝低亞墻素心人不逺谷口更相望簡孟伯人仲人兄弟二首愛竹真成僻看山豈厭頻一朝諧夙願猶喜得芳鄰流水通丹竈秋花接錦茵吾廬冬更好繞屋十分春小圃秋光接從君乞藥苗荷香常過院松影迥分橋爾汝詩頻寄東西酒屢招梅花三十樹珍重雪初消茂逺邀看芍藥以病不赴宋先生以詩見示時方閲鍾紹京靈飛經帖漫成奉答二首録一首我聞郭芍藥好道積精誠女子猶如此勞人太俗生風前憐艷蕊世外想佳名莫被繁華悮金丹術不成望華山蓮華五千仞靈孕自洪濛每雙風雲色能參造化功隂將連太白氣自滿關中欲問真源在仙人住蘂宫白石寺寺在鹿谷白石山中寺岧嶤紫翠重尋僧常有約無路復何從一水飛為雨雙松化作龍幾時蓮漏下奮迅禮金容奉酬太宰陳說巖先生二首悠悠只如此還念舊山期來以鶯花候歸當雨雪時瑶華感相贈楊栁悵空垂百拜懷春酒仍求夀母辭著述誰能並尊聞有舊堂人爭推吏部世久說歐陽詩入午亭古書追丙舍蒼蕺山六角扇真許耀家鄉公近搆午亭較刋全集悔人移居奉過一飯遂讀其京華集二首聞道近移居相尋過草廬客中艱一飯君尚具雙魚官舍藤花老悔人守銓最久秋窗棗葉疏春明綰新綬瑞雉始迎車愛爾京華集逡巡又幾年慣書乞米帖濫用買山錢拜命思巖邑移封畏酒泉尋常發鄉夢東浦已春煙陳陟齊給諌叢蘭雙枝合蘃繪圖索賦聖代稀封事看分階下泉低時如帶雨密處似含煙莫訝三珠樹休驚九品蓮連枝仍共萼競爽謝庭前潭州遇李屺瞻前輩夫子罷官久髙懷人不知相逢湘水上同過落花時世事只如此天涯何所之猶能藏斗酒醉讀屈原辭韓中丞署中喜晤羅宏載北旋賦别三首十日巴陵道三春官閣中干戈殘堞在琴酒故人同夢