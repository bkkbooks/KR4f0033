body:
  text: 送吳天章歸中條二首王士禎二月春蕪緑紛紛蝴蝶飛花朝逢暮雨寒食減征衣道路誰知巳登臨不當歸中條多水竹此去掩荆扉愛汝王官谷他年擬借居三峯當户牖五姓足樵漁田舍堪懷古茅茨宜讀書獨憐好身手歸去注蟲魚又一首王士禎中條最深處風物四時幽水鶴穿雲下林楓夾岸稠人煙盤豆驛村路玉溪流卧起清暉裏蕭然何所求讀馮圃芝餘事集因題吳天章還山詩卷王士禎木脫石氣清吟君古調詩落日髙鳥去碧空淡涼颸一吟扣一絃一吟傾一巵嘈嘈立部伎孑孑寡女絲巧笑倚市門漆室聲苦悲猿鳴上峽夜雁驚團沙時遙憶中條山雲物秋正竒吳生家山南拾橡恆苦飢朝吟看雲出暮吟逐雲歸河聲與嶽色中有太古詞誰為昭與聾獨有馮生知自注天章在燕市得古銅章文曰河聲嶽色所居正河嶽之間也挽天章徵君王士禎生入甘露門死為甘露滅豈况無生忍不生亦不滅豫昔事禪悅兼復慕遊仙門前玉女峯上有十丈蓮下界六十年逢場暫遊戲來去衆香國終然飽禪味不屑海山住應歸兜率天下視大火聚蠛蠓爭撲緣已空文字障靜閲莊嚴劫何事勞結集猶煩大迦葉天章逝時異香滿室與先兄西樵同衆香一語亦吻合竒矣懷舊趙執信蒲州吳雯蓮洋拙於時藝困躓場屋中體貌粗醜衣冠垢敝或經嵗不盥浴人咸笑之而詩才特超妙余嘗比之溫飛卿云與漁村同薦既試報罷其父故與阮翁同年始入都以詩投謁阮翁心折極口為延譽而其性迂僻寡合遂淪棄終身與余甫一見如舊相識余好用馮氏法攻人之短惟蓮洋不以為忤其作字用馮法粗知間架然不能工也晚相值於津門出詩卷見示曰曩之所攻悉刪改矣乃知其非名輩所及也屬余論定余請俟異日蓋其時正逢阮翁之怒不敢闌入詩壇故耳又數年蓮洋卒於家卒後其集聞送新城阮翁為作墓志且刪定其集迄今將二十年矣而未行於世意其時阮翁耄而多忘未幾遂亡未及歸諸吳氏耶若然池北藏書散失殆盡蓮洋集從可知矣築室中條山招手玉女峯黃河繞門前滌蕩萬古胸埋頭試牘中啼號羞秋蟲風騷適榛蕪揮刃侔神工脫棄范陸習踐履岑髙蹤貌似溫方城才與遇並同詩老性護前於君禮獨隆貴遊負販豪交臂來趨風聲名天可假時命人能窮濩落王官谷穿冢連司空遺文寄池北飄散隨萍蓬追維平生言使我心忡忡虛疑玉溪底匣劍藏芙蓉終當沉鐵網大索蛟龍宫王官谷玉溪皆在中條題吳雯徵君詩卷朱彛尊藉甚吳郎大雅才賦詩不上柏梁臺翻飛却似橫汾雁幾度秋風上苑來蓮洋詩鈔附録
