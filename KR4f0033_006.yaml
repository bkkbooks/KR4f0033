body:
  text: 蓮洋詩鈔卷六蒲州吳雯撰五絶野渡野渡添秋水危橋一線通臨深能自力終不汙泥中渡河曲岸鴛鴦穩回村荻葦秋傷心今昔事不肯付東流寶公拙龍千柱少巧鳩一柴足忽罷滏陽工西山坐茅屋卦山四首録一首石路何盤盤老柏一萬樹風吹柏子烟引入翻經處團雲寺即事以空山不見人但聞人語響為韻十首寺在山海關録一首危坐傍東巖衣褶緣蒼鼠恰到㑹心時前峰對無語同雷道生昆仲晚眺沙苑晴無風金光乍明滅蒼茫河渭間人家在春雪題孟氏山堂彈琴坐風柳明月臨髙臺新凉破清曉一一水花開再過山堂三首録一首新荷滿清池屈曲朱䦨靜波光曉鏡開半入垂楊影題梅淵公黃山畫冊八首為陳子文録二首懶雲橫山腰怒雲起山足千道百道泉一間兩間屋碧玉作屏風蒼蒼沉落照孤亭阻白雲終古無人到潁川宿公㦷先生書屋北風無停時聲動萬竿竹凄然聼已悲况是他鄉宿邯鄲歌暮踏邯鄲月曉踏邯鄲塵邯鄲朝復暮不見邯鄲人懷子文鹿脯曽留帖鵝羣更頌書還經王母廟不饌錦江魚初子文傳轉蜀餉晚春五絶句録一首鸂鶒交前浦鴛鴦過别灘莫因風雨惡吹動釣魚竿見山色不斷口號芳草正萋萋垂楊絲不齊青山如送客直過鴈門西過子覲不值云在宫東酒肆二首録一首行行緑隂下禽聲隔溪水一片華山雲吹入宫槐裏送張翼雲之馬首兼語續方山之游二首録一首春雨濕桃花匹馬花中去若過神福山為禮翻經處出都别友人二首録一首匹馬青門外垂楊覆板橋莫傷搖落盡猶有最長條出郭出郭饒清事溪流一帶斜浮萍翻惱客一半是楊花西溪西溪清淺流洄洄雜菱荇白鳥忽飛來萍開見山影謝亞夫先生送桂花醬桂父昔食桂分此為清惠採得小山花釀作江南味女朝汲郎行秋澗上妾行秋澗底秋澗濁水泥不入銀瓶裏逰棲巖寺六首録一首危磴一百盤巖風蕩林藪滴瀝石門泉飛作人間雨訪隱者不遇白雲滿前山山門亂溪水幽人何處尋立久聞松子和聞雁月裏參差影風前次第聲清商天外落多少世人驚懷山堂山中有草堂未得山中住白雲不讓人占盡讀書處晚行山下林深如風雨黃葉下山路日暮不逢人寒溪獨延佇送張健一之魏郡三首録一首顛倒不成眠殘鐘天欲曙何事最關人聞君濮陽去蓮洋詩鈔卷六
