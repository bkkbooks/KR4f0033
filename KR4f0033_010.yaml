body:
  text: 蓮洋詩鈔卷十遺文蒲州吳雯撰寄阮亭先生書别慈顔久矣依依左右無日不然家居備極苦趣已屢陳於老伯之前無煩更道矣中州皇皇年餘實圖一勞永逸而究事願多違然從此得田三十畝五崖伯之惠何可忘也所恨賦命薄劣歸而病困且婚喪並舉所費不資年來轉增逋負頓令此中擾擾萬不獲已勉為瀟湘之遊而長沙古稱卑濕貧國當事所行又非區區所執故所如輒不合家人有作宰者又復解官是姪以數千里之奔馳不能不行歎坐愁自困於洞庭之南祝融之北矣今且寄食華容令君處秋風凉冷决計歸矣籌此往返不惟無益而更滋纍甚焉不知何日更能追隨杖履承色笑成一詩即就老伯正之為一文即過老伯裁之每念此樂未嘗不精神飛動宛然花前載酒執經問字時也前在里門時即聞東亭先生有異說至今恍惚不敢遽以為信是以未敢少伸慰問如果然則老伯骨月之間亦何其多變也言之痛悼之極因思謝太傅看山携伎雖朞功之服不廢絲竹蓋實感哀樂於中年而且用銷煩憂於暇日也尤望老伯善自寬釋善自珍攝拳切之私最誠最懇幸鑒照容納之耳方山先生近履想益佳勝昨始得其紫海所寄書深荷存注伏望老伯為姪一申謝為感潭州頗有作不能備録文二首恭上删削吳霜越鬢悵情事之日非沅芷澧蘭歎山川之多阻低徊北望彌切瞻依惟冀汪涵可勝忭悚寄姜西溟書十一月二十八日雯再拜西溟先生閣下但有北使至未有不首詢先生動履知先生精力强盛日事著述且求法書者接踵户外裹餅金尚不能得隻字甚慰甚慰元彥兄至益悉道範佳勝又得讀塞游圖小記深感先生拳拳記録如此非古所稱知已者耶日望先生西來比知史事相縈恐不能一過蓮花峰下宿矣懸仰懸仰近閉置使院同客朱字緑兄好作古文辭因勉令同作輒不禁浸淫為之因思曩者嘗奉教先生猥以庸惰不知黽勉今欲更為之而不得日侍先生為指南可惜也更念居恆慨慕古人如韓歐陽者而恨不同時如先生同時矣且從之遊矣不能毫得其益竊歎資質庸惰即遇韓歐陽亦無用也至於見貽法書弟見裝潢成帙并有小記書後即友人處裝成者亦有小記書後雖不成語然其傾仰篤嗜亦不可謂不至然則弟於先生亦可謂知已者也不然亦侯芭之流也先生又何可鄙棄而不教我耶閒中望更多書小幅或真草皆不拘惟多寄為感耳少間亦當書近文字奉質也字緑尚有求先生文字知必慨為操筆亦不俟弟之嘵嘵矣雯再拜白與梁晳次先生書共四札今録二札憶三湘返棹浪跡堪憐而更以病驅幾難自問特䝉老年伯存恤慰藉感次心骨别後風雪特甚兼以病阻遷延於嵩髙伊洛之間直待年底始達里門想多生之業不絲毫歷盡亦不為取報之無私也歸里托庇慈蔭漸獲平復分擬杜門而世務牽繫應考汾陽遂又之京師席不暖而突不黔亦不知鹿鹿者何為都中即寄棲阮翁伯之廡下時獲提命之益又承代謀醵資援廪例入雍以免更受學使者之威嚴北闈旅進困躓猶昔十月間阮翁已奉使海南而姪亦往來瀛津不名一錢寄食於人此即别來之大較也然經此千錘百鍊漸亦稍有知覺當下具足本無缺缺亦無人我之分别亦無古今之久暫但恨筋力柔脆不能擔荷而雜以事務未免時顯時晦昔人所以云捨百齡於中身殉膚肌于猛鷙非實力以踐之恐亦不能一了百當也恭惟老年伯精詣已久正合皈依猶望指南茲因王舍親回鄢敬藉候福履臨禀可任馳戀悚企之至二屢承寵召感鏤心骨非盤餐之下輒作過情逢迎之語大抵意中無此人則或忽略之遺忘之而惟惓惓不置者恆於此際亦見一斑姪雖飽其德實感其意也嗚呼意氣語誰不能道及閲歷既久惟老年伯為最真耳燈下兀坐默念萍踪飄泊輒泣數行下乃備述其途窮之狀及知已感恩詩一首姪之意盡於此矣復何言哉復何言哉公㦷年伯興致反不如作司寇時姪亦非不能勉强相求而顧以生平所期望之人亦必令故人之子作奴顔婢滕之狀姪反恐待潁川之薄而願甘於在縲絏之越石也乞老年伯若遇時一咨其意之所在或共商其所以為小姪地者姪非吳兒之木人石心自當知之艷詞姪已盡焚矣有題焚詩詩云十載支離苦負情柔詞綺語可憐生從今燒却梅花賦别有深心到廣平又云蘭畹金荃絶妙詞傷人元氣起人思淵明已是何人物文選樓中有異辭姪之意亦可見矣然其得力於老年伯者豈淺鮮哉近僮僕多病旅店倍增惆悵月內擬旋老年伯其何以教我外佩韋集一册戊申所作惟評示之臨穎依切與笨山舍人書豫每讀史於隱逸方技傳喜不忍釋手且惟恐其易盡也蓋其內必多淡泊寧靜之言而亦可以少窺道德之奧也驪城笨山舍人與豫同學且十年矣久而同志偶讀仙傳乃自刻每傳以一小詩櫽括之日以若干首為程既卒業使豫為數語書於卷端以志歲月余時方涉河潼過太華終南太白日在襟袖此皆仙靈之窟宅也顧勞勞塵土不能述其梗概取所謂曠邈精鍊之軼事盛跡一憑弔而歌詠之可恥也已而笨山方築欸乃書屋於漕河之湄鍵户危坐讀異書賦偉句漁歌檣影交於户牖嗚呼遠矣猶龍氏不云乎不出户知天下其出彌遠其知彌少豫誠愧笨山哉然笨山亦嘗欲作關輔之遊矣秋髙雁翔其肯擕諸咏以樂乎窮車箱之谷登太華之巔此時驚人之句不必遠假於謝朓也相與歡呼而豪咏之如衛叔卿古丈夫白雲先生之流皆可令之駭愕而出把臂而遊豫雖謭陋猶當踵其後而和之矣吳觀察克菴詩序海豐吳公溫恭篤厚其為政以正人心厚風俗為本鎮河東不三載人飫其德俗化其教間出其所為詩示余至性藹然深有合于三百篇之㫖焉人皆服公之善為詩而不知公之所以為詩即公之所以為政也夫雅頌之什舂容博大皆賢士大夫之所作故讀其詩即可以觀一代之政未有措之於政不能涵育豈弟優游而馴致之而發為聲歌有以中和平之音而備溫厚之㫖者也故傳稱誦詩三百不達於政即不可以為能誦詩之人夫誦詩而不達政尚不可以為能誦詩者而顧可謂能為詩者乎則信詩與政通也昔李百藥見王仲淹而論詩上陳應劉下述沈謝聲病剛柔靡不畢究而仲淹不答也薛收曰吾嘗聞夫子之論詩矣上明三綱下達五常於是徵存亡辨得失小人歌之以貢其俗君子賦之以見其志聖人采之以觀其變今子之所言皆夫子之所痛也由河汾之論觀之則益以知詩為君子見志之言而即為政之所從出也今公之為政亟亟焉宣布聖天子之德意於人心風俗之際推誠曉譬幾於家置一喙務求三綱明而五常達則是為詩之本先具矣而出其緒餘以流連於山川景物以及朋友贈答行邁宴賞之末又何有不協於雅頌之賢士大夫備舂容博大之觀而中溫厚和平之美乎且投簮志切今始遂懸車方將於致政餘閒而更樂其嘯咏之適於山見泰山之髙於水見滄海之深豈不益有以紓其懷抱而托其遙情也乎乃者主爵惜公之去請於朝再將以他故屬公吾知公以耆碩之望而再著其歷鍊之才昔韋左司領劇職而愈優文潞公入中書而倍健而兩公之詩清逺麗密晚益造微今公不遂厥初服將仍出而為政吾知公之所以及人者不在兩公後而其所以為詩者亦不在兩公後也詩有之曰吉甫作頌穆如清風吾將為公載咏焉趙秋谷并門集序歲甲子秋谷使於晉得詩百篇以示余其詩結體清真脫去凡近非曰字句之工而已余嘗論古人一言一詠皆有體格體僞而格下者雖聲文斐然皆凡也近也秋谷抱異才負竒氣渟泓駿發其於世也率情自好無所緣飾故其為詩也直而不俚髙而不詭蓋如其為人矣夫十五國之風詩唐最近古秋谷行其地其有取於陶唐氏之遺風而為之者乎余晉人也山川都邑登臨覽觀之勝皆少所習者顧不能言之及秋谷言之而正如余意即恐余雖言亦終不逮也其在唐風有杕之杜曰彼君子兮噬肯來游中心好之曷飲食之撫斯集也咏是詩而三歎焉萬滙菴詩序新城王先生論詩絶句云髙論滄浪萬古留止憑妙悟一言收又云詩情合在空舲峽冷雁哀猿和竹枝故詩之為道必有妙于色相之外者始為上品為絶調羚羊掛角無跡可求豈可以思議及豈可以語言索哉善乎莊生之言道也曰夫道有情有信無為無形可傳而不可受可得而不可見然則讀書堂上遂為堂下斫輪者所笑顧知有句無句皆為滯語善學者甚不可以一芥遮天一塵眯目也丙子冬客宛丘已半載始能拜莫亞夫先生於其堂先生為先臨潁府君同門友也八十而有嬰兒之色讀書萬卷老而彌篤亟述宛丘所與往還朝夕者萬子滙菴而巳且云滙菴寡交遊閉户息影所與執經問難亦惟亞夫先生因持其一詩見示有孤舟烟雨荷花渡五月關山杜宇鳴之句心竊異之未幾而即晤於亞夫先生座中氣肅而體莊沉默淵深不可涯際時方持兄服謹而戚嗚呼滙菴至性人也及讀其所録詩凡百首滙菴又有至情夫無至性不可以為詩無至情亦不可以為詩性情者非詩而即所以為詩此即所謂有情有性無為無形者而又何遠索哉滙菴既得其所以為詩可以於有字句中索滙菴亦可以於無字句中索滙菴滙菴亦可以於有字句中索詩亦可以於無字句中索詩然則余之所以望於滙菴者又豈但詩而巳哉余願滙菴即詩而通之天地之始終山川之流峙日月寒暑之推遷風雨露雷之變幻人物鳥獸草木之出入消息誰綱維是誰鼓舞是皆此物此志也以此論詩詩之境界大矣以此悟詩詩之本源遠矣請以質之亞夫先生必有不徑庭余言者他時即上謁新城先生亦當嗒然而笑也時丁丑人日羅蘿村詩序康熙戊午春方以博學鴻儒徵天下士於是士之能文章者咸集京師而㑹稽羅子蘿村亦用大司農梁公薦應召至時余未識蘿村然竊聞其為人行至髙居母夫人喪適丁賊亂里人皆驚避蘿村獨處空山守倚廬不肯去㑹賊大至見偉丈夫衰絰骨立苫凷間無懼容賊衆皆歎異相戒退曰此孝子也願無驚擾孝子蘿村生平自立可稱述者甚多論其大節已卓卓如此余用是急欲識其人是蘿村之所以至京師者以其文而余之所以願交蘿村者則以其人也自是數過從遂發其篋衍盡讀所為詩歌古文辭贍而則約而能肆博辨而彌厚私心益敬重之是向之願交蘿村者以其人而後以交其人因得窮其所為文也越明年已未三月余與蘿村皆放還蘿村後入湖南幕府涉洞庭下熊湘而余亦浩然歸卧中條之麓家居數當骨肉之變憂傷荼苦轉以疾困足不出户限者且一年蘿村顧於數千里外時通尺一問訊慰勞無虛月其篤於朋友又如此繼又數勉余作瀟湘之游而余亦以它事南來得再握手使院中風雨琴樽晨夕無間回憶曩歲蹀躞黃金臺上時直昨日事而鬢髮各變感慨係之矣已更出其所已刻詩凡十三卷曰子盍為我益細論之余自惟不敏何足以言詩顧竊以為古之為詩者大約皆出於忠臣孝子勞人思婦所不能自已之情初無意於為詩而矢口信心其詩亦遂為後世之所莫能及而為聖人之所樂收今蘿村既得其所以為詩者矣尚有疑於聲韻之微體裁之末乎其詩古今體具偹而更附以長沙感時賦事諸什蓋蘿村身在軍興久矣親見戎馬交錯殺傷狼藉婦子纍繫井里蕭條雖大寇已殱而荒郊廢壘殘骸撑拄每悲風四起驚沙亂飛烏鳶銜肉而晝翔豺狼穿穴而暮嗥故其詩益慷慨悲嘯蒼涼激楚而不可讀嗚呼蘿村仁孝凝靜人也向在山中身臨白刃而不懼而何以至此則感愴涕洟之無從也豈非在已則其天已定而在人則胞與之懷又不能以自已歟然則讀蘿村之詩益以見蘿村之為人也嗚呼蘿村豈但為詩人也哉畫雁記畫雁一卷其數百其飛翔羣集各有態皆安詳容與遠近匹儔於蒹葭叢葦之間若各適而無驚弦離羣之恐其景况蕭遠沙明水淡宛置身瀟湘洞庭閒曠而不拘迫樂豫而不愁蹙雖畫者禽鳥羽毛之屬而其境界清適足以生人遠襟曠懷則甚矣畫之妙者能移人性情如此也昔戴安道就范宣學皆為范所為惟獨好畫與范殊范以為不宜勞心於此戴乃畫南都賦圖范始咨嗟甚以為有益始重畫余嘗謂古人左圖右書今之所謂畫即古人之所謂圖也何可輕渺置之耶此卷厚卿先生寶祕之凡二十年矣一日出以相示於蒲東官舍秋風蕭瑟菊英滿庭相賞皆在筆墨蹊徑之外因憶疇昔讀離騷經愛美人芳草遂發興為湖湘之遊以為長沙清絶之區而琴曲中平沙落雁為瀟湘勝概乃屈子七題二十五篇中都無一雁字何耶惟其弟子宋玉為其師作九辨有云雁雍雍而南遊又云鳬雁唼夫梁藻詎屈子憂讒畏譏以為雁有矰繳之患故不及之耶抑駟虬乘鷖戒鸞凰而騰鳯鳥馳於遠者遂忘於近耶今觀此卷乘居匹遊相與恬適於汀洲蘋藻雖稻粱之不充亦罻羅之自遠又何必乘鷖騰鳯之始為適也哉先生好古成癖積書數千卷多集古人書畫名蹟庋而藏之間與好事者持觴浮白評隲較論無不中肯綮者昔秦太虛官汝南高符仲擕輞川圖相視太虛欣然即使二兒引閲以為恍若與摩詰入輞川度華子岡經孟城坳憩文杏館上斤竹嶺絶茱茰沜躡宫槐陌窺鹿柴返於南北垞航欹湖戲柳浪濯欒家瀨酌金屑泉過白石瀨停竹林館轉辛夷塢抵漆園茗飲賦詩都忘身之在汝南也今與先生共閲此圖即如偕先生登嶽陽樓泛青草湖過君山謁黃陵廟聽湘靈鼓瑟與宋玉景差賈誼莊忌輩招三閭大夫同翺翔流覽於平沙落雁間也先生屬題數語聊書以復先生愧才不及退之畫記細述雁事如人之事三十有二人大小百二十有三馬之事二十有七馬大小八十有三也洗筆池記湘鄉縣北有池如半月曰唐登善褚公洗筆之池昔公以諫武昭儀事出為湘潭都督潭州山水荒險可觀遊者少至湘鄉而景物稍幽秀公行部及之而有愛焉理或然也而後人因公之所流連既重公能不愛其地與地多塘坳相接遍種荷芰菱芡而兹池獨謂公浣筆於斯豈非公書特精妙故稱之以志美與咸淳中得斷碑於池中刻公之詩曰遠山􅍶崒翠凝烟爛漫桐花二月天遊遍九衢燈火夜歸來月掛海棠前清麗而閒適無遷謫之意則公當日其所以與潭人同其樂者又可見也公鎮潭愛潭之人即於斯池亦足以見潭人之不能忘公而竊謂公之所以不可忘者又不僅區區鎮潭一日之愛也蓋公之賢天下莫不聞故凡公之所偶一歷覽其流風餘韻千百世後無不令人憑弔慨慕而不忍去也則公之所以感人者何如哉而當日為之上者擯公惟恐不急竄公惟恐不遠者何也豈非愛憎之至變而艷處之蔽者深與而因思有國家者未有不欲其臣之忠于上也忠矣而往往遇之不以道不惟資之庸下而有所蔽者然也即有為之主亦不能免焉豈賢者之所遇有幸不幸哉亦其勢然也而至於公之所值則更以庸暗之主而兼以宫壼之私宜其還笏殿上而即潭州而南荒不瀕於死而不已也則公之流連於斯池也豈真有愛於此也哉辛亥之初秋過池上仰公之遺徽因悲公之遇而且有感于凡欲行其道而處愛憎之間之難為也尊有酒不禁為公再拜而三酹之感物車有箱有輪箱靜也似愚輪動也似智輪之勞不若箱之逸也發大石者必以機機狡然似智石磈然似愚機之危不若石之安也然則天下之物智者常勞而愚者常逸也狡者常危而磈者常安也逸者物之所爭托豈智者而反忘之智者之勞智者之所以求逸也而不知求逸而益勞安者物之所共適豈狡者而反背之狡者之危狡者之所以求安也而不知求安而益危嗚呼求逸於勞而勞益甚則何不求逸於逸也求安於危而危益甚則何不求安於安也夫求逸於逸求安於安者何也蓋凡物莫不貴反其本勞生於智欲遠其勞但屏其智而已矣危生于狡欲免其危但絶其狡而已矣獨奈物之愚者少而智者多也磈者少而狡者多也且愚也而所以為智者無不至焉磈也而所以為狡者無不至焉卒令竭一世之擾擾而至於不可救者何也書義山河陽詩後義山河陽詩乃悼亡之作也王茂元為河陽節度使愛其才以子妻之故詩曰河陽隱辭也其詩云黃河搖溶天上來玉樓影近中天臺正言甥館之美百輛之盛也龍頭瀉酒客壽杯主人淺笑紅玫瑰蓋謂琴瑟之調而容色之麗也梓澤東來七十里四語則且殁而葬矣南浦老魚腥古涎四語則欲夢見亦無由矣憶得蛟絲裁小卓四語則又思其平生之事也幽蘭泣露新香死畫圖淺縹松溪水即畫圖省識春風面之意也楚絲微覺竹枝髙半曲新詞寫綿紙則又思其生平所作歌曲也巴陵夜市紅守宫後房㸃臂斑斑紅則又思其閨房之戲也堤南渴雁自飛久蘆花一夜吹西風則又傷其沒也曉簾穿斷蜻蜒翼以下所云玉灣不釣蓮房破惜傷愛絶也銀鏡鸞叉撫遺物也桂樹金莖亦思少君之術也相風插屋候其至也至百勞不識湘竹千條則亦終不可見徒淚積斑斑耳其意婉轉其詞深沈雖效長吉而情種自見也銘讚疾銘疾本無疾病本無病不能調御輒致凌競如水起漚似木生癭漚癭何來即水木性金剛不壞第一無諍知常曰明法天曰聖守中致和盡性至命一念萬年寓諸無竟凖提像讚稽首凖提王功德不思議百千萬手目拯濟恆沙衆將身坐寶蓮為世見光影若論其究竟無在無不在嗟我蟣蝨身負障等山嶽身見不能忘山嶽何時了伏望慈悲力默相加護佑一切非一切無上解脫門身色如琉璃曇雲四彌布如是衆生盡佛願即完滿蓮洋詩鈔卷十
