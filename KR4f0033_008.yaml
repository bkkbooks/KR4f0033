body:
  text: 蓮洋詩鈔卷八補遺蒲州吳雯撰五古中秋李太守招集崇實書院看月秋半物候肅雨餘山光淨恬然講院中耳目絶囂競我公比秋月相招恣清詠顧此月常有此月獨端正光開海上雲朗掛天邊鏡肯辭酒盞深苦乏詩思横徘徊不知歸清景惜難更不覺既醉餘疎略賴寛政失題本然無去來云何有夢覺不見三途苦寧識四禪樂寶月湛空明何從受顚撲徃來三十年無乃妄卜度今日蠶叢路當時雪山閣都作一塵看光輝照寥廓上豫撫徐青來先生楊柳春風生春烟浮吹臺驅車燕趙間仍復大梁來公子緬千載侯生安在哉彈指閱今古惜此年光催早年具微尚箕潁慕髙躅曳裾向侯門艱辛為親辱夫子清静心因為萬井福再拜矢皈仰道風見肅穆清標凛寒玉仍與物為春羣然惕冰淵中實含至仁師表範百寮康濟歸兆民繄余借楷模亦欲善其身嵩華豈不髙河洛豈不逺瞻企復溯洄始信自輕淺昨更禮白雲秉戒自黽勉有道皆可正敢較瀆與諂大人本無我品類皆陶鎔惟兹大造力知不棄顓䝉循步依崇髙客心寧匆匆徘徊對霽景花間問春鴻小人誠有母八十缺饔飱禄養久不能又復違晨昏勞生何日閒僕僕辭國門所嗟蒲柳姿早凋復何言公訝早衰故及之挽張聖佩孝廉萬事皆空虛一念獨眞實當其堅固處終古不泯滅嗚呼栢巖子感我最親切投分塵壒外結契金蘭側論文每夜分杯鐺必狼藉嗜古同一癖名蹟肆羅列指瑕各中瘢賞竒互探秘兩兩㑹心處一笑無言説有時共揮毫一研錯雙筆君書我最愛我書君尤悅書成互盤礴氣應蕤賓鐵並騎看春山散髮舞秋月狂歌驚僮僕清嘯動寥泬君本磊落人浮名等一吷折腰輕五斗息影罷交接我尤慕蓬閬所恨弱水隔中條有茅屋偃仰聊自適雨畊薇蕨紫夜舞蝙蝠白君每欲相過書問空重疊昨日晉陽旋慰勞憫行役苦欲留我住傾倒共朝夕游子念慈闈八十難久别上馬各戀戀皆如有所失到家曾幾時聞君成永訣驚心如噩夢不覺肺肝裂嗚呼君行誼必當享髦耋嗚呼君相貌必當捧符牒胡為百尺桐無風自摧折幸有丈夫子林立皆英哲幸有蘭玉孫神駒爭齕囓流光本飛電百歲同恍惚何須分久暫彭殤一軌轍况君過知命齊物冺欣戚所恨同學子一旦少矜式百里齎鏡具刲羊恐無血雞絮陳几筵物菲意非䙝悼痛為此辭九原應酸惻七古送大凱之官宕渠嘉陵江上草萋萋海棠花開雲錦迷使君三月到官去相送春風隨馬蹄十年夢想峨嵋道汶嶺何曾逐登眺使君今日宕渠行羡殺山川入妍妙使君本然清凈身為政能使風俗淳游讌何妨臨篆水熈恬端可化賨人使君鎭西近梁益我欲因之慰疇昔巴馬騎過陳壽祠棧雲引到譙周宅更訪仙人謝自然遺踪靈水湧金泉馭風亭上還須到下看齊州九㸃烟李苑仙攜酒過石鼎園詩以留之東風連日亦太甚桃花楊柳半吹損却喜君能載酒來石鼎園中共我飲今日風中君又歸河邊楊柳尚依依何如持觴不歸去醉來便臥垂楊樹失題缺寶缺姿宛如玉錦韉朝過中條麓白馬驕嘶不肯行為惜障泥緑楊曲二月韶華鶯欲啼眼前芳草又萋萋畫省星郎雅不羡吟詩直過杏花西謝鶴菴自蜀歸鶴菴老子神骨清還丹欲學隂長生生平最愛蜀山好投老真為萬里行杖上江聲杖底山蛾眉光彩有無間荔枝豈但經年食又道親嘗甘露還蜀棧勾連記去程歸來三峽識䕫荆細腰宫畔陽臺夢尚有朝雲暮雨情灑然萬里竟歸來握手風前坐碧苔只恨相逢歌哭並時張聖伯仙遊新詩當作杜陵哀五律寄呈徐子惺方伯六首帝眷殷南服朱轓下鄂州垂鞭碣石館清嘯武昌樓輓粟饒河内籌邊重列侯只今餘戰艦春雨暮灘頭家風追孝穆薄海大名垂豈借江山助寧矜藻繢竒漫郎空鑿石元凱但況碑爭似髙文在流傳歎色絲百折壺頭路勞生不可禁已垂元亮綬難任少游心拮据隨戎馬艱難負橘林依依宫柳色北望惜繁隂鸚鵡芳洲好他時幾往還徵歌山水曲問字茝蘭間箬谷邀青鳥寒溪對白鷴千秋幽絶處特許弄潺湲載酒遍名藍彈箏倚石楠尊移萬松嶺詩比百花潭耳熱同分蔗林香自擘柑竒峰九十九醉墨灑沉酣為報湘波靜天南罷鼓鼙功存陶士行勞並庾征西素雁來何處丹旌望轉迷支牀雞骨甚行路亦凄凄汴水九日二首白雁黄花節他鄉倍黯然風猶吹野馬日不暖鳴蟬冷蘂侵籬濕晴沙裹浪圓南來有書信好寄鶺鴒篇黄菊東籬好家山更若何雨看嵩樹濕雲憶楚臺多筆札銷閒晝壺觴托嘯歌高齋稍偃仰也勝洞庭波氷魚二首存一首珍味海門有盤飡山客新歸應夢龍女出已泣鮫人登爼當霏屑承筐亂錯銀桃花三月水相憶隔波臣七律贈雪客氷港東連海氣昏髙齋俯仰壯心存悲歌漫托詩千首慰勞常煩酒一樽氷霜嵗晩寒猶急草木春歸綠已痕再向天涯歎鴻爪玉蘭花下有柴門哭某人詩四首頻年京洛涴衣塵本是河陽舊隱淪感因道徳交方古契以文章意最真忽缺海南題柱客浪傳河上緯蕭人許爾千秋是知己傷心便作九原身片語端能訂久要合歡花下和吹簫琴樽笑語剛三日裙屐風流隔六朝豈敢再過丞相府惟應常夢侍中貂夜臺先有阿䝉在且省茫茫怨寂寥早年聲譽重瑶林中歳飛揚衆所欽安世詩書尊扈蹕𤣥成閥閱競冠簮文章頗厭時人望事業空懸薄海心生平不墮尋常淚為爾臨風涕滿襟十載曽聞幼婦詞願將銀管寫烏絲愁當鸚鵡爭傳處痛在玲瓏再唱時舊譜空教蛛網遍閒情猶有笛人知從今錦字休零落一認弓衣也淚垂失題四首頻年把菊種東臯海上重來踏六鰲偶向人間留姓字過煩長者問蓬蒿頓驚有道襟期爽更愛新詩品格髙晩向畫屏開酒甕酣吟不待紫檀槽鈴閣鐘聲破黒酣齋居彌勒恍同龕舊聞游屐耽江左早有詩名重渭南倩畫佳人清似水自書小字細如蠶英風更入神明頌空畍蟾光浸碧潭尺五天邊位望尊高懷獨欲托芳蓀梅花此日調成鼎楊栁他年種作村嶽色幾曽抛箭栝河聲嘗是夢崐崘等閒雞犬相聞處不少田家老瓦盆幾次辭官更拜官無求容易有求難年華肯向忙中過世事皆從悟後看署裏松枝供秉拂池邊鷗鳥識垂竿買山倘為巢由計紫閣峯西闢藥欄贈汾陽楊司訓汾上春歸雁早來冷泉關外草花開晴嵐故繞官橋柳遲日全融漢殿槐異縣豈云分苜蓿愁心翻怪夢臺駘匡時知有天人䇿且對華燈覆玉杯程都閫還姬詩十五盈盈抱錦衾廣陵濤並楚江深只言葉可盟新侣誰信花能返舊林季女懷春羞碧玉將軍重義薄黄金羅屏屈曲圍紅燭照徹千秋柳下心失題朝來山下適相逢便去看山興倍濃路指垂楊石齒齒雲迎珠樹水溶溶洞中瓊藥藏紅雪巖際飛泉走玉龍更有長鳴天外鶴徘徊只在兩三峯五排上卞芝亭觀察任倚股肱重家承節鉞雄文章傳紫府纓珮出珠宫澤並汾流遠聲偕霍嶺崇召棠猶陜北郇雨已河東鰲極安桑柘龍門潤稑穜康衢宣帝力姑射領仙風列㦸髙連華稱觥近祝嵩梅花開鼎實桂樹發巖叢大厦欣雲構勞生慰轉蓬韋平依峻閥燕許仗宗工化普生何厚知深道未窮長吟親獨坐正映海霞紅七排河中形勝關設蒲津阨兩壖城臨天塹控三邊朱甍傑構重華殿翠琰穹題廣孝泉五老山髙横晩照二妃陵古起愁烟龍門北顧思前聖雷首南觀憶昔賢渡口鐵牛唐室建汾睢寳鼎漢家遷海神望秩時仍故河瀆居歆歳不愆城郭一般猶舜日山川萬古是堯天蕨芽舊采余偏嗜桑落新篘衆所便陶邑器成還苦窳帝鄉民雜更顛連盛時揖讓皇風泯叔世交侵覇習傳比屋可封今已矣畫衣不犯亦茫然五刑弼教焉能措三木收威未易捐少似夷齊能遜國多如虞芮好爭田君侯司權銓衡重部使分行黜陟專持節義當勤察訪更弦須在謹承宣共期風化隆先代咸五登三萬億年七絶題汪東川編脩秋山讀書圖金馬門前好是閒暫來雲壑聽潺湲他時若訪絲綸客只在山光樹影間題園壁蘆雁斜陽蘆荻隱寒烟接翅汀洲自在眠只待曉風輕振翮長鳴依舊傍青天丁丑二月再過安陵喜晤膴臣撫今追昔成詩四首存一首三十年來歎路岐相逢各訝鬢如絲登堂風物原無改仍似山翁把酒時伊陽道中口占二首歸路轘轅趂曉晴伊流風細縠紋生仙人故作凌波步先在安陵道上迎明璫珠佩各嫣然大似雙成共拍肩金縷枕邊香入夢朝來特為冩紅箋潁滸絶句二首潁水春時如碧玉宛轉東流頽淺沙一夜風聲在楊柳朝來吹作鬱金芽埽地久同郭有道轉鹽初學王伯齊夢到五更益安穩兩年聽慣汝南雞焚詩十載支離苦負情柔詞綺語可憐生從今燒却梅花賦别有深心到廣平蘭畹金荃絶妙詞傷人元氣起人思淵明已是何人物文選樓中有異辭簡韓子固君家墨妙誰能及片牘擕歸山舍中千里相思比相見幾囬乂手對屏風蔡琰漢家國是入哀彈帳秘將人更不安空有辨絃知識在金徽抛却不重看啞娼刺繡合歡床上繡鶼鶼半向停針揎指尖驀見蹴花雙燕入輕泥落處黙生嫌觀柳明菴演金雀雜劇戲贈相公曲子久堪傳不是癡腸不是顛領盡人間花月味風流重見栁屯田聯句古藤書屋送吳徵君魏上舍聯句握手古藤下秋深旅愁積歸來西溪旁猶及種春麥吳雯我亦袖輕鞭明發辭紫陌倦鳥不同飛各自張旅翮魏坤二子澹雅才肯為時俗役英詞迭相應如以桐扣石陸嘉淑柳塘水潨潨蒲坂山驛驛改歳君到時古藤花滿格查嗣璉改名慎行大房一斗泉釀酒氷雪白酒熟君不來落花良可惜朱彜尊蓮洋詩鈔巻八
