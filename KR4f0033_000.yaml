body:
  text: 蓮洋詩鈔别集類六國朝提要臣等謹案蓮洋詩鈔十卷國朝吳雯撰雯字天章本遼陽人順治六年其父允升任蒲州學正卒于官雯兄弟孤弱不能歸遂為蒲州人康熙己未薦舉博學鴻詞不中選其卒也刑部尚書王士禎為志其墓稱初見其詩有泉繞漢祠外雪明秦樹根濃雲濕西嶺春泥沾條桑至今堯峯上猶見堯時日諸句吟諷不絶于口所作居易録中又亟稱雯西城别墅諸篇趙執信懷舊詩序亦稱雯拙于時藝困躓場屋中體貌粗醜衣冠垢敝或經嵗不盥浴人咸笑之然詩才特超妙其詩一刻于吳中再刻于都下三刻于津門後士禎為刪定存千餘首亦見墓志中因雯沒之後未及刋行故懷舊詩序曰蓮洋卒後阮翁為作墓志且刪定其集迄今將二十年未行于世意其時阮翁耄而多忘未幾遂沒未及歸諸吳氏耶池北書庫散失殆盡蓮洋集從可知矣云云然其集實已歸吳氏乾隆辛未汾陽劉組曾裒其全稿刻之又以士禎所評者别刋一小冊並行越十三年甲申山東孫諤官蒲州府同知始從雯姪敦厚得士禎所定原本簡汰重刋詳載士禎之評併以劉本所遺者補刻于後復以所見墨迹補之其士禎所删而劉本誤刻者咸為汰去凡得古詩二卷近體五卷補遺一卷詩遺一卷文一卷冠以墓志而附以同時唱和題詠之作即此本也雯天才雄駿其詩有其鄉人元好問之遺風惟熟于梵典好拉雜堆砌釋氏故實是其所短劉本所刻無所持擇頗傷冗濫此本沿新城之派又以神韻婉約為宗一切激昂沉著之作多見屏斥反以鄰于清弱亦不足盡其所長然終較劉本為簡潔故置彼録此至其所載士禎評語繁碎特甚如題汪玉輪看劍圖詩下附記云原本評語奇作二字似阮亭先生筆跡胸有造化四字非阮亭先生筆跡刻本併作一處誤又如城曲眺望詩下附記云原本題下有墨筆評劉長卿之詩也不知何人評阮亭先生改作絶似劉長卿云云此亦何關宏㫖而字句異同乃如是其珍重之今悉刪除以廓清耳目焉乾隆四十四年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀蓮洋詩鈔原序河中為郡當兩戒之首形勝冠寓中記稱太華中條本為一山巨靈贔屓掌華蹈襄開為二以通河流禹貢之壺口雷首龍門華隂正當其處古秦晉之交也中條之南有地曰永樂唐詩人玊溪生故居在焉水經云河水又東永樂澗水注之注謂渠豬之水即其地也經又云河水又東北玉澗水注之注謂水南出玉溪義山自號蓋取諸此吳生家永樂讀書奉母耕牧河山之陽家苦貧數數出游走燕趙齊魯梁宋吳越之墟所至與其仁賢逰處歸而有詩數百篇古淡閎肆得古作者精意而自成一家之言灼然可傳於後者也昔在丁戊間生來京師余胠其篋得蠧簡數十番讀而駭歎謂非流俗所應有以示劉吏部汪户部梁侍御三君方枋文章海內其駭歎復不减豫今十餘年矣比生再入京師則三君者皆解官歸卧或十餘年或七八年而吏部又前殁昔之與生逰相知者獨余在耳相與追道往事太息感慨至於泣下嗚呼以生之才挾其文藝逰於四方歷十餘年而所號為知已者無過豫輩四三人不數年間皆散去或且化為異物久矣豈不重可感哉於是豫召之飲酒既酣復胠其篋則其詩雷硠劃豁又過於昔豫讀之河傾燈灺不知止惜乎三君子不在不獲與之矜賞如曩時也㑹天子下詔求博聞之士備顧問著作於是謝比部方山以生名應詔或以為生與司馬子長生同里又同逺逰其才皆不世出蓋河山之氣融結於千歲之久宜其先後相望無愧色是固然矣然子長生逢武帝右文不免戮辱發憤述史記生遭遇休明以布衣之賤一日名逹黼扆行且荷槖簪筆立第二螭坳之下曾何子長之足云又況義山白首幕府名不挂朝籍者哉漁洋山人王士禎序吳徴君天章墓志銘漢魏已來二千餘年間以詩名其家者衆矣顧所號為仙才者惟曹子建李太白蘇子瞻三人而已本朝大一統閲六十載作者亦多矣余獨以仙才許蒲坂吳君此余之私言也亦天下之公言也君且死語弟霞曰吾平生知已無逾漁洋先生吾即死遺詩勿遽出必待先生刪定雖相望二千里而勿憚跋涉而往求焉且謁志墓之文吾無憾矣余居田里聞君之訃為哀挽以代楚些其末云已空文字障靜閲莊嚴劫何事勞結集猶煩大迦葉未幾而霞至將君遺命余詩若為之䜟然嗚呼異哉豈余與君精神感通雖越在二千里不以幽明間有如此耶既次其詩遂為其銘君諱雯字天章其先遼陽人也父允升中順治二年順天鄉試六年授蒲州學正十二年賜同進士出身明年卒卒後次年吏部按籍銓授知臨潁縣君幼孤母朱氏有節操撫君及弟霞等皆成立遂籍於蒲君姿秉殊絶嗜書如飲食又薄帖括以為不足為雖在諸生輒瀏覽羣籍自六經三史外先秦兩漢下逮六朝唐宋元明四部之書無弗習也旁及釋老內典祕笈皆鈎貫其㫖趣含咀其英華而尤於五際六義有深嗜焉初僑居中條山南之永樂永樂唐縣也李石兄弟三相皆居之詩人李商隱義山亦居之號玉溪生玉溪者永樂水名也君少而食貧無以為養數游京師謁父執友年二十餘矣京師士大夫無知其詩者豫一日過同年榮工部洞門見其詩云泉繞漢祠外雪明秦樹根又云濃雲濕西嶺春泥霑條桑至今堯峰上猶見堯時日大異之曰此非今人之詩也吟諷不絶於口久之君再入京師一見談藝輒夜分不休如釋迦之有鶖子溈山之有寂子相說以解不待往復扣擊君固以謂余一人知已如后山之於南豐也戊午己未間天子詔徴博學宏詞之儒備顧問特舉制科海內名士鱗集闕下君在舉中顧獨耽寂守素不與他人走健僕囊巨軸宛顔低眉望門求知者競馳逐膠牢淡泊門有雀羅余以是益重之臨朐馮相國知君名以扇索其詩君大書二絶句答之其坦率如是卒以不遇亦不悔也君遊燕趙齊魯吳越秦楚足跡半天下而梁宋間詩尤工晚訪舊天津復與余相見京師時康熙辛已君年將六十倦游矣君好友天下士士之名雅者亦皆援君自重所至縞紵贈答無虛日然君胸中涇渭不徇世俗毁譽凉燠以為親踈故人亦樂就之所謂嵇叔夜土木形骸黃叔度汪汪如千頃陂者庶幾似之平生好仙釋有空諸所有仰青雲睹白日之意情耽隱逸僕僕四方謀升斗以為甘㫖之奉非其志也嘗買圃鄭谷之口有竹數百挺黃梅數十株橘三株中作草堂面雷首肘太華怡然自足將以終老而迄不得遂嗚呼其可悲也君詩一刻於吳中再刻於都下三刻於津門今未刻尚千餘篇余刪之不少貸所存皆卓然可傳蓋痛君彌留不忘諈諉之意亦以報良友於地下云爾今當寧右文士苟懷一藝朝躡芒屫而夕登館閣者何限君之名固已聞於朝矣而終不遇窮老以死是尤可悲也君娶祁氏有子二人江蘭早卒崇厚州附學生亦前卒繼娶聶氏孫一逢源尚幼君卒以康熙四十三年甲申五月二十七日得年六十有一以康熙四十五年九月十一日葬姚溫阡君嘗以詩賦應制科故稱徴君銘曰山河兩戒皆首河中重華舊都扶輿所鍾昔在唐賢摩詰王右丞祁人徙河中允言盧綸河中人義山玉溪李商隱懷州人居永樂表聖王官司空圖虞鄉人有明名世首兩襄毅楊公博王公崇古勳名爛然風騷未繼嶽嶽吳生崛起布衣身處菰蘆名動京師聲滿天下尚謀升斗晚卜莵裘子真谷口惟君之詩疏越朱絃後有知者移情成連神之往來河聲嶽色君得古銅印刻此四字修竹梅花徴君攸宅賜進士出身資政大夫原任經筵講官刑部尚書前都察院掌院事左都御史新城年家老友王士禎撰
