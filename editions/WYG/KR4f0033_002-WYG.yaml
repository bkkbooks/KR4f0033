不已天為徒化腸為筋理則有神仙化腸為筋故能不榖食血化白乳也鍊身同鶴道豈誣李翺贈詩云鍊得身形似鶴形千銖松下兩函經我聞大道無多語雲在青山水在瓶休訝先生山澤癯龍門傳記列仙儒朝夕過從命飲食雕盤羅列筍與蒲江南橘剖黄瑪瑙潞州酒滴紅真珠炰鱉膾鯉無不有折項真見鵝鴨俱溫言奬勉意良厚凴几含酡興未孤酣暢不覺發清辨口道堯夫經世書先天後天在指掌太極無極非畫圖修身更進參同契戊巳刀圭研上虞小子聞之醒聾瞶宛丘不負循墻趨臘雪已盡未歸去又見春風來坐隅生平有願皈道業擾擾塵心難驟刳醴陵終愁筋髓冷江淹封醴陵侯文集中有恐筋髓衰冷之語長沙早恐年夀徂逺游輒思隠懸霤垣闕竟擬修蓬壺結習無如障文字世緣那便抛妻孥筋力柔脆更自哂仔肩大道非凡駑畢萬七戰全牖下畢萬鄙夫也七戰皆獲死於牖下有馬七乘見在單豹巖居逢於菟十殺一人歘相戒飲食牀第翻畏途人生福厲那可定趨避益令疑難攄離垢還期効慧斐劉慧斐號離垢先生搆離垢園潔齊修佛得証善果忍欲未得偕林逋姚察讀經悟空寂姚察姚畏謙之父讀佛經悟一切空寂孝先蔬食沃醍醐徐孝先蔬食信佛後証果桂父桐君跡有據桂父服桂得仙桐君亦古仙人也金庭石室途非迂間闗未透成悵望麤鄙不盡増踟躇右軍游目眺汶嶺大令鵞羣歸崇虚優劣未可卑餓𨽻騰舉髣髴皆仙都自昔文人慧為業於道為近乳酪酥執冊再拜重請益先生教我當何如同阮亭先生坐方山司寇匏齋論詩先生遂為書古今人名句竟二長幅喜而作歌羼提先生才調奇風流真具天人姿文章磊落妙一代作字更欲追繇羲殘墨如金自珍重豐屋不取珊瑚貲貴人往往多責望遷延終以不能辭昨日偶過謝公宅琉璃硯匣盤蛟螭先生入門一笑粲髙齋茗椀浮春枝談藝輒抽簡編亂運腕時見精神披豈因棐几便㸃綴恍如練帔呈淋漓跂脚飛灑露敏妙羣鴻髣髴遊天池突兀拙迸冬笋籜娟靜細引春蠶絲遥情忽述大人作隨意閒寫家風詩須臾神明煥兩紙歘然修禊山隂時春蚓秋蛇態爭出家雞野鶩言何卑嗟我貧困走京洛身無長物空低垂一朝捆載得至寳木難火齊勝攜持世間耳食那辨此公殆天授非人為碌碌門簿廢時日今朝不負千秋期歸來什襲竢終古㑹有後日揚雲知祖龍行鍾山已鑿紫塞崇鱗鱗日照阿房宫芙蓉銷盡金人氣寳厯從此垂無窮靈藥迢遥問秉海千秋萬嵗期常在此生不擬禪扶蘇那知身後防胡亥昨日徐郎有報書帆檣將近羽人都何事君王不相待輼輬東來雜鮑魚却怪宫妃未偷藥至今猶挽蓮花索鄉寧山城即景山雲啓新霽林屋含清暉風吹兩黄蝶時繞山樓飛老農向煙且驅犢溪女背人猶浣衣次青縣題壁去年九月長安來鯉魚風起船旗開今年三月舊山去馬上綠楊掠飛絮舊山風景復何如昨日家人有報書當門萬里崑崙水千㸃桃花尺半魚簡謝趙章侯將軍立春日招飲今日立春春已入簷際春風便習習將軍髙宴啟轅門斫繪燔熊衆賓集當筵百戲間瑶笙急管繁絃繞畫屏玉瓚頻傾千日酒金盤真壓五侯鯖將軍名閥湖山上玉季金昆坐蓬閬氣懾千夫意不驕書探萬卷神方王秋來秉鉞大河濵蟠花錦映玉麒麟説禮敦詩本儒者輕裘緩帶真天人繄余珠幢瞻紫氣為君揖客増欣慰豈但投壺致倍髙更㸔結襪風猶貴今日之樂樂如何千觴在御歡情多願持幕府霜毫筆寫入軍中朱鷺歌酬贈郭乾為時同客西谷侍御使院淮海郭公來夏五使院相逢觴屢舉文章不減徐常侍腰腹大類庾開府酒後常時舞鴝鵒筵前即可賦鸚鵡開口便能取富貴立談早已驚公輔其如文戰久不利尚爾遲回困環堵跛驢大笑走南北行巻沈吟閲寒暑來年決定奪錦標一鏃三重洞鐵鼓嗟我垂老百無為圖飬八口少百畝衣穿剰有皮骨存履破難以干將補不思仙侣追鵷鷺但析田舎迎貓虎賴有彭城柱史賢天涯能念金蘭譜與君同味學士鹽青眼可以計出處君自青雲我白雲䖍拜木公謁金母待爾功成身退時相尋再與商終古題遂閒堂趙松雪畫圖憶昔驅車北平道停車特謁夷齊廟階下偃松亦太竒就地蟠拏助清嘯今日堂中作畫㸔吳興妙手冩生難更畫柴桑老處士歸來獨撫恣盤桓堂上主人柴桑客官職不同性情一歸歟久自稱卧松取意何期畫中得我來堂上樽酒同海濤髣髴聞天風不須放筆為直幹且㸔隨地蟠蒼龍痛飲㸔圖還一笑笑問堂中卧松老鷗波筆墨北平姿畢竟精神是誰好卧松捧腹當我前松畫兩皆無間然畫松早冩真松意真松還仗畫松傳我對畫松更長喟松畫非一亦非二與其驀直觸風雷何如蠖屈留天地此道由來應不窮南華之妙惟環中君不見修幹多裁作梁棟丹黄反作山中夢願君㸔畫更懐真休傷材大難為用題張魯菴方伯清潭印月圖風潭百頃如傾銀潭上明月如金盆月華瑩澈浸潭底如琉璃合無纎痕有人齋心潭上坐心憐淨緑不忍唾孤情恰與白雲閒萬事都如飛鳥過潭上卉木何紛紛青藤紅萼無冬春皎皎方㸔潭上月兀兀已忘潭上人潭上月華潭下水湛然一𣲖空明耳我心正與水月同水月與我何彼此嗟余平生心未降水中索月増勞攘豈知已為第二月標月之指難禁當先生事事有真契語黙從來少凝滯即㸔觸處發天機冩向圖中已餘事今日當機惟嗒然清波瀰瀰月娟娟等閒莫向潭中覔一月還教遍萬川題劉鑯龕負劍圖冊子有序葢聞善攝生者陸行不遇兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刅鑯龕志於道久矣豈尚資一劍之利哉然昆吾冶鐡炎煙横飛滓穢盡蠲純鈎乃精淬以鸊鵜發為蓮花綠龜蹙鱗青蛇㺯珠隂陽刑徳混於杳𡨕舉之無上抑之無下運之無傍漆園不能説司空不能窺鐡龕之意將無有取於是乎於是劉子倚柱而嘻曰有是哉遂短詠記之以復劉子文采帶利劍古人稱盜竽劉子豈其然將轉轆轤珠籜冠斜披日本裘背負一段青珊瑚世界不平平心地心中那有不平事眼底皆付晉人吷筵前肯假公孫器知勇為鋒亷為鍔大匠無端代求斵總然千里不留行那見龍鳴勝屈蠖寳鼎温温火候勻百鍊摶成無價珍風胡無言歐冶死從此蓮花有化身淵黙匣中生霹靂負之而趨誠有力動靜須教山鬼驚行藏那使天魔識徙倚休嗟行路難長空珠斗夜䦨干安居始信真無事多少癡人畫影㸔此身歌柬韓元少先生此身謂非我居然耳目能明聰此身謂真我呼吸不存俄生蟲臂彈尻馬寧異説鼃蠙鴝掇捐雷同世人紛紛轉茫昧因之蚓竅爭蠅蠓逝者如斯歎川上無言本自歸鴻濛明明此意在鄒魯其如雷電乖盲聾雕刻心思養口體尋常貪恚成伐攻福輕於羽不知載百年馳驟何終窮美食投箸輕萬錢峩冠大佩修髙容髙名厚實兩俱得聲華誰敢輕汙隆總使千秋尚餘慮金蠶玉盌埋丘壟水銀池沼雜鳬雁可憐長夜魚燈紅以此膠擾鄙囂遝況復先聖多發䝉十年有學願無學相視而笑疇堪共先生文章具性道使我捧讀心神融天授鉅手闡元化軒轅鏡子懸青銅昨日慈仁一握手罘罳薄日光玲瓏吉人藹藹見真趣竚令塵土開心胸世間原自多上士轉忘纓紱分雌雄長而不宰果何徳從斯永擬參猶龍蓮洋詩鈔巻二
