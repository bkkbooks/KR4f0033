body:
  text: 蓮洋詩鈔巻二蒲州吴雯撰七古昌化寺觀吴偉畫壁長句晨興騎馬縁山嵎初日照眼明金鋪石磴無人散松子入門茗荈追清娱何人善繪江夏吴應真五百窮規模其上調御古丈夫諸天劍佩紛來趨袈裟一縷覆大地三大劫等翻轆轤無所從來亦無去始終不異難覷􅎿兩壁磅礴盡意態凌風蹈海神靈俱鸚鵡塔向指尖出猢猻藤傍眉端扶作使天魔如使奴獰惡慴伏情恬愉公無渡河胡為乎只愁罥挂摧頭顱何事毒龍肆吞嚙乃從腥吻結跏趺緇素膜拜驚且呼毒來慈受毒囁嚅人間横逆豈不爾參互比擬皆無殊鵲巢於頂膝穿蘆天花落處成氍毺如此定力合讚歎總持妙湛將同途金錫汾陽示激勸圓相溈仰開䝉愚西來之意豈盡此令人惝恍生躊蹰山水暴漲能徑渡髻珠道人斥其誣幻化由來亦輕𣺌忍俊不禁堪胡盧自乳生酪酪生酥酥分生熟成醍醐搬柴運水神用足粥飯既了滌鉢盂貪子得珍乍驚喜終非長者安其帑細觀蘭那見奇特所詣已善猶有虞將無顯異尚惑衆波提木乂還自逋即如延陵此繪畫煙絲霧縷真難摹當其經營備慘澹可悟萬象由虚無識心達本乃至要莫眩五色隨糢糊去愛有如摘懸珠一一摘盡愛水枯聖凡不立是何境性清淨故超瑕瑜陟嶺赴潭柘寺作一嶺鬱岧嶤横斷潭柘路香光莊嚴𣺌何處奮力登躡頓忘疲豈云濟勝全無具忽然湧出青蓮花千峰萬峰不知數人在青蓮花裏行僧在青蓮花裏住豈知勝地限咫尺功力未到終難遇寳閣崔嵬入雲表石龕􅏭嶫開珠户雨後爭㸔修竹林鶴來忽動青松樹珠泉滴瀝遞空響鴨脚甘蕉䕃行步齋厨供饌衆花集長廊梵唄神龍䕶嗟我勞生慕棲隠對此真令屏塵慮安得早謝區中緣靜息西巖發深悟蔡州道中鴻郗陂南蔡州道千里黄雲漫秋草白龜浮波天茫茫瑶林垂實珊瑚小汝墳客帳聞荒雞犢車碾破花溝泥倡樓雁斷思不斷珠燈照夢沈玻瓈池讙鵝鴨氷雪改豈為封侯躡重壘愁結胎簮走玉龍横出南徐入東海贈杜蔚門先生郎君谷口花無數棲巖寺底竹千畝幽人來往花竹間心與白雲淡無取避世即是鶡冠子忘機還應漢隂叟虎溪醉客歡把臂龍藏禁方秘懸肘讀書不厭細如髪作字何妨大同手將烹赤鳯喜鼎温欲採黄精愁雪厚藥奩紫芝兼丹砂世事白衣任蒼狗汞葉旋㸔鉛花生丁女正藉壬公守嗟余久嚮鸞鶴羣勞生空作馬牛走長沙近復憂夀命張仲恐難終孝友却仗我翁常慰藉未可志氣便衰朽昨日東郊迓春仗一夜南園變風柳青旂猶欣重到眼花勝寧嫌亦挿首從此相過踏芳草或可雨留剪新韭石鏡舞雞對烏几湖船射鴨拍銅斗人生適意聊自足鼷鼠飲河量所受阿誰能解踏踏歌為翁一勸薄薄酒貽洪昉思洪子讀書處靜依秋樹根車馬何曽到幽巷骯髒亦不登朱門坐對孺人理典冊題詩羞道哀王孫長安薪米等珠桂有時煙火寒朝昏拔釵沽酒相慰勞肥羊誰肯遺鴟蹲嗚呼賢豪有困阨牛衣腫目垂涕痕吾子摧頺好耐事慎莫五内波濤翻屈伸飛伏等閒在總於吾道無亨屯前有萬年後萬古刹那何用爭鷽鯤君家西子湖鸂􅈃交文鴛湖上諸山太蒼翠歘從海外飛崑崙掉船載酒便亦足天漿手挹神騰掀少伯百計乃得此胡為懊惱嗔山蓀紅裩錦髻過蕭寺虎靴桃杖投煙村頺然醉卧藉芳草忽忽明月升金盆海天長嘯圖為張輔公别駕題海天浩浩何端倪海風吹水如玻瓈中有髙人洞元化襟期廣達無町畦眼前萬境不能惑天外三山如可躋一聲長嘯徹雲表逌然鸞鳯千虹霓青松鬰屈動鱗甲丹藥恍惚存刀圭嵗月煩囂任擾擾生平意度常折折道服身並九臯鶴酒杯手捉駭雞犀童子葫蘆何所挾蘭臺叙傳或相齎况有神駒稱邁種七日超母驚驒奚桂枝結實蘭芽茁一堂三世荀陳齊從此門閭益髙大上林珠樹容聫棲繄余卅載托末契杯鐺横攪金留犁閥閱方㸔韋兼杜朋好還次阮與嵇今日重過羡爽健氣清貌粹頻招攜芍藥堆䦨間玉版檳榔滿斛交金虀何人繪出髙世姿獨立海畔島嶼低一時相對意飄𣺌圖中座上眼欲迷朱霞南映北海北青裙東拜西山西古今何似蝸角觸世界忽如鴻爪泥題詩擲筆且大笑安得玉虬為駟隨風鷖韓周京司馬招集鄭谷山園㸔牡丹次晨遣力送花報以長句廬陵醉翁稱好事特譔洛陽牡丹記著作仍是五史手君謨書法益精緻如何愛重反詆訕癭木比擬失倫類極美苟與極惡同大聖陽虎皆偏氣其中惟有釋花名撮要分疏頗詳備丹州延州各有種粗葉細葉總堪識九蘂真珠態最殊倒暈檀心格尤異再三細讀轉増感瞬息繁花有遷易宰相園池盛桑麥魏仁溥花名魏紫僕射馲䭾香銜轡張齊賢花名青州紅品目誰辨軍容家唐末有中官為觀軍容使者花謂之軍容紫溪山已改龍門寺唐相李藩别墅在龍門改為潛溪寺謂之潛溪緋中條之麓多水竹其間卉木亦妍媚將軍舊墅君能守丞相家風儼不墜榖雨已過花尚開愛客移樽花下醉朝來折枝還贈我鹿胎蓮萼今何愧却念此花䕶持好遂使顔色免顦悴雨露雖同天地力剪伐實恐樵牧累當年此花載本草風俗何知宜與忌褒斜道中推為薪豈料山河表祥瑞歌詠初見賓客詩夢得有咏魚朝恩宅牡丹詩稱述久入康樂議靈運言永嘉竹問水際多牡丹極盛必待開元後珍卉難强時未至自唐則天後洛陽牡丹始盛嗚呼萬物遭逢無不然題詩馳謝發長喟寧陽周太師母年九十餘善飰而健喜而詠之以當登堂之一拜也太母年九十康健不用扶將無有道然豈但天秉殊太母於吾母其義猶為姑小子别庭幃今已九月餘夢想念慈顔惟恐色不愉忽聞太母健其心怡然舒太母九十既如此吾母七十必安居歸述太母吾母前即以太母為母娱吾母聞當拜太母遥遥東望整襟裾太母有道授吾母臨風専望北來書里中送韓翌宸有序癸甲之交識翌宸於長沙幕府意氣傾倒歡相得也自此離合之際動歴年嵗升沈之感更復憮然庚辰嘉平再過蒲坂把握讌欵欣戚交并甫獲申嵗寒之心詎遽作春明之别依依楊柳青未盈條惻惻離亭紅翻掩袂敬賦長句聊當歌驪凡我同人皆宜奏雅當年扁舟青草湖寥落江上稱窮途艤舟更傍黄陵廟把酒長吟兼獨笑煙波風雨浩茫茫無衣客子垂空囊鷓鴣聲中歸不得躑躅花前神暗傷伊時中丞開幕府再拜軍門色先沮豈知延禮出尋常留我華堂迭賔主翩翩公子氷玉姿横槊江頭工賦詩座中更有文章客李白屺瞻羅含宏載皆在兹彈指年光嵗復嵗盛衰之際心如醉豈但客子如轉蓬歎惜繁華已遷易羡爾公才迴不同步武方追舊鼎鐘官階不失中郎貴雲朔仍留萬石風可奈繁霜忽又早鶗鴂一鳴歇芳草世事還驚掣電飛人情更訝狂瀾倒昨日新從浦口還家門却比客中山雪中鴻爪雖難定海上鵬雲終不閒昨日臘雪暫相駐今日春風又復去槃園梅蘂惱人花大河楊柳傷心樹更念髙情為我留金昆玉季情綢繆取歡便可鸜鵒舞貰酒不待鷫鸘裘刺促無端道傍别青絲玉壺轉愁結鸎聲猶凍谷口雲馬蹄已破中條雪噫吁嘻人生聚散本無憑但能努力終飛騰棨㦸原是君家物十年仍可大中丞放歌寄趙秋谷太史秋谷罷官余在山海未能走送特寄此奉慰兼寓勉望云爾大海為蓮池衆山即蓮花天風萬里肆排蕩萬柄青玉交杈枒千艘千蜻蜓一島一蝦蟇忽然夜半赤日上波心飛出黄金鵶我當此時飲一石褰裳濡足思無涯恨不即攜秋谷子把袂浮拍吟瓊霞三日得君音使我情咨嗟知爾縱飲罷官去歸途雨雪車啞啞京國急來問親舊憂爾負氣神參差豈知漁洋北來正遇爾道爾胸無芥蔕顔貌嘉眼前纓冕如脱屣猛風吹盡恒河沙噫吁嘻人生萬事何時了朝起營營暮擾擾官爵九遷仍苦卑黄金千鎰終嫌少吾子賦性殊不然棄官無悶方少年得失榮枯本閒事誰能不動天中天噫吁嘻秋谷子大奇特不負當年好相識力大能持震電驚心空不受天魔惑噫吁嘻秋谷秋谷方汝行恨我未能飲汝以濁酒勸汝以素筝爾去且復藏其名精金大冶百錬堅貞九重聖人真聖明他時再起東山謝方知爾可付蒼生贈陳其年漁陽桑葉落寒風遂蕭條美人逺自江南來手持明月簮瓊瑶乘秋理鏡發髙詠和以鳴鳳秦臺簫傾國傾城誰第一羡爾榮華艷朝日從此承恩入蘂宫宫中行樂何時畢槐石歌為佟儼若賦中丞清白世所無罷官便同山澤癯一朝賣宅悵無居假屋聊取安妻孥公子矯矯才氣殊鸞翔鵠峙羞泥塗移家空載五車書下鍵却掃追清娱翻喜新堂槐䕃鋪當門怪石蹲於菟解衣盤礡興不孤間有好事來提壺長安酒肉厭屠沽髙樓燕笑羅摴蒱食鴈而美閒且都明燈廣厦張􅉊毺公子寂寂胡為乎據槐倚石仍咿唔嗟我四十悲頭顱尚書朝請計總迂胡不歸去軟塵俱松風真負青山逋過從數坐青珊瑚摩娑石丈稱吾徒聞君指日江南趨猶為饑遣爭長途回視此樂不可圖況欲髙館吹笙竽嗚呼亷吏可為言何誣不見楚相之子負薪啼路隅贈匡山老人郭翁臯旭匡山老人齊得䘮髩髪蕭騷骨骯髒讀書萬巻眼不昬飲酒一斗神猶王五經腹笥何便便蹉跎一官失少年宰相豈肯借車馬司業何曾與酒錢朅來燕市屠沽飲醉聽琵琶夜忘寢節鼓常敲翡翠盤翻杯輒涴葡萄錦千鍾百榼氣轉豪客帳猶懸舊寳刀起舞身摇謝蝴蝶和歌聲亂鄭櫻桃忽對長空見歸鳥自傷為客何時了金馬門前再住難春明待走邯鄲道宋觀察牧仲過海門見示悔人早春倡和詩依韻賦贈憶昔少年尚馳騁頭顱四十愧朝請已知不是宰官身自分常依居士嶺騰擲休任獼猴狂精進當學獅子猛其如結習愛文字有類柔稊發枯梗丹經一笑帛裹鬚皂㡌幾頺墨淋頂惟信胸中少鱗甲峨嵋雪水一千頃食貧卄年成逺遊世態低昻暗知領本性往往受拘縛夷則鏡困蛟龍井入洛安得比鄒枚懐沙只可弔屈景公也威鳳知鸞飢作歌傷我羽毛整更念瑯琊及安徳殷殷慰藉常記省細雨空懐野寺梅客春雨中阮翁約㸔花善果寺炎風幾憶巖闗杏方山有杏村别業在鹿角闗同人皆為賦詩誰知覉棲東海邊公來同啖雲門餅兼云勝友朱桃椎衙齋鬬韻奪香茗攜將佳句爭上駟貪誦偏宜春夜静才力韓孟各分疆交情盧馬同一礦歸來長嘯驚神魚月明棹撥玻璃影我亦蚓竅發蠅聲却令珪璋束藤綆公言明朝當早發使我延望愁日永舉首髙天雁正過島嶼蒼茫晩猶靚移情是處感成連塵慮喧囂一時屏故人已去鄉思深夢入通天見沈炯低頭重懴起滅心水本無波木無癭題張振宣行人小照君家别業招賢里幾次尋山探石髓簷前每宿太華雲池内常分玉溪水溪邊楊柳何毿毿水色空明天蔚藍閒來把酒溪上坐鷺羽扇子揮晴嵐更喜青衣能解事窈窕臨風栁邊侍湘裙小蹙玉壺傾美鬒不動金釵膩羡君斜倚黄瑠璃簟也退之詩一府傳㸔黄瑠璃滿酌天漿對水湄真珠波濺聲喧處菡萏花開香到時繄余溪山縱遊衍澗東七聽春鶯囀余住永樂凡七載花塢難忘載酒頻竹林猶記題名徧今日重來東海頭久煩白飯兼青芻畫圖琴酒轉相感將無仍是西園遊君方置身在廊廟翠翹枕畔催朝早安得依舊風柳前遲迴髙卧爬仙爪題文伯仁山水巻最有江南客能畫江南山江南山色緑於染人家住在青㝠間溪橋横亙幽人渡渡口蒼蒼隔煙樹多少樓臺春雨中山鳥山花自朝暮古寺朱墻倚石屏雀離髙映錦帆涇千株松下無人跡只有風吹九子鈴柬江解州辰六中條山下來時路幾日楊花作春暮馬上頻㸔戴勝飛花開舊館應無數今日仍從山下行花枝低亞宛相迎南鄰酒畔定相待況復堦前新笋生新笋生時如碧玊相間花枝照茅屋篋裏亟尋荷葉杯案前再補陽春曲其如垂槖意蕭然遥念花枝誠可憐歸來不用賖春色只向先生乞酒錢