  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0033_WYG_005-1a, image: WYG1322/WYG1322-0348c.png}
body:
  text: 蓮洋詩鈔巻五蒲州呉雯撰五排寄呈梁大司農承明曾奉召玉署喜相存國士知何忝尚書道最尊孤忠通貝闕素念託棠村騕褭途方逺鵾鵬翼正鶱愧無將履敬先得下堂言薦禰書仍在投瓊語更温何曾分得喪端不異寒暄座席春風接長途夏雨繁㸔花懷畫省折栁記青門豈待無相識方知感舊恩呈五崖伯二十韻京洛承顔久嵩瀍問道稀一年辭貝闕千里覲慈幃辛苦年空長艱難事日非心堪繅繭亂身豈食熊肥揚子經抛案安仁鏡掩閨文章成聚訟辭賦得長饑天上愁難寄人生願苦違長途悲騕褭閒幔下蛜蝛乞米収殘帖㸔山别舊磯金蘭增鄭重昭穆藉光輝禮樂遵陶鑄英才仰範圍兼崇乾竺業曾少漢陰機朗鑑千人爽風清衆議歸有詩貽杜位無絹授胡威對酒燈花落論文燕子飛素心期黽勉神理盡精微化被蒼生雨風行海内衣一時欽紫氣不日陟黄扉魚水存符契風雷仗發揮千秋三不朽所得是皈依呈補念秦公二十韻一代文章伯千秋令譽長筆曽專國史名早動先皇草蹴龍池緑衣沾鳯署香登朝題琬琰取士得琳瑯百粤煩旌斾南天仗乂康三洲鐫玉乳五色馭神羊吟帶羅浮雪資捐翡翠裝節囘梅鋗嶺綬照客星堂澤與桐溪潤聲留大滌蒼更聞秦塞曲亦藉漢庭良黑水軍容肅紅鹽幕府張賢勞久西海淑問復南昌劒氣豐城剖仙峰玉笥藏虛延禮孺子道濟溯旌陽近眷鹽梅托新猷海岱傍豈徒民愠解頓使國威强廿載皈依切三餘景物芳龍門登百尺蟲技獻千章葛帔還能惜金蘭自不忘從斯百寳色沐浴發竒光觀海始識朝宗大登臺覲廣洋乾坤成澒洞風雨失尋常日照扶桑小雲流太古荒蛟龍通窟宅魚鼈沒橋梁一氣元精合千帆島嶼長飛仙如可接鶴馭轉茫茫呈雨亭王公二十四韻淮水波瀾逺瑯琊慶譽長金貂仍棨㦸玉節復巖廊遮舫春雲緑隨車夏兩香英風飛紫電績學擅青箱章貢留棠蔭河汾仰繡裳聰明淨冰雪特達有珪璋井邑霑恩澤蒼生樂壽康題箋才敏㨗博物鑒精詳劒許司空識書驚内史良英聲髙季布雅調寄韜光八座行當陟三台計日將昔欣瞻海嶽今再覩星凰霽色迎階爽薰風入座涼隼旟花隱隊鈴閣竹分行玉屑聞清語珠躔慰靣墻謀生何太拙投老轉潛傷日月荒松桂乾坤失稻梁銅龍追獻納金馬夢趨蹌棲逸修丹竈晨昏理葯房半雞慚置庋全豹慕登堂㧞薤觀新政懷嬰際法航即斯成錦里隨處得滄浪麤糲貧能給蟲魚注不妨索居久寂寞從此快翺翔蒲城郡南舊有海瀆神廟頗極壯麗自大河去鸛鵲樓下殿宇漸成荒廢戊申初春過謁不勝感慨乃為詩十韻以誌之余有濟川志徘徊海瀆宫風霜殘殿瓦葵麥遶簾櫳老栢無全緑雕梁有斷紅塵埃生白帝樵採入黄熊傾倒天吳像荒涼野踪人情隨顯赫神氣有衰窮昭代方崇祀豐碑尚記功何妨使丹堊重令闢蒿蓬日月開朱户罘罳罥碧空他時瞻拜下俯仰快朝宗雨亭王公雪中旋斾喜成二十韻于役晉陽天歸途宻霰懸山中瓊作樹河上玊為田鳥䑕迷空谷關城沍冷泉人家增爽塏樵路失蜿蜒送臘梅分纈先春栁破緜坐來消玉馬行處撲金蟬擁騎寒侵袂微吟凍入鞭歌樓薄酒力僧舍就茶烟思欲追梁苑才應美惠連汾陽懷帝子姑射對神仙黄竹謡寜述幽蘭曲已傳潔清鷴並素浣濯鶴同鮮長養資調爕陰陽免伏愆風雲瞻氣象珪璧契方圓每伏陶鈞力常叨造化權本然懷潔白更取勵貞堅值物寜移性班形幸自全袁安誰枉轍江革尚分氊徒領風人㫖難酬郢上篇豐年知有瑞先報上公前秋日再過王官谷十四韻表聖幽棲處白雲解鬰蒸典型終古峻頑懦百年興空谷何人到孤亭我再登磵花纒細石巖樹曳髙藤危磴千峰翠飛泉萬仞冰清暉聞白雁爽氣擊蒼鷹詭激寜傷直徘徊轉見𢎞哲先迷栁璨節已信王凝龍紀辭榮早鸞臺飲社曾有懷方墮笏無礙任分繒花苑誰留客苔龕尚見僧避喧勾漏並絶粒首陽仍勝日詩堪述秋霜史亟稱只今書劒外何處得良朋送桐城相國二十四韻調爕歸元宰勲庸紀上賢立誠通黻座主敬格皇天懃懇趨三殿劻勷計萬年豳風七月古丹扆六箴傳日月資開霽乾坤仗斡旋維星登皡皥終日尚乾乾盡瘁真無負和衷道已全鞠躬移帶孔攬鏡訝華顛遵渚鴻猶集翔雲鳳已鶱懸車應有禮生耳敢貽愆古諺仕宦不止車生耳國計丹心繫鄉思綠野懸天階申虎拜山色乞龍眠主聖恩猶渥臣忠眷自專翻憐衝臘雪特許踏春烟芳草安車穩春鶯舊谷偏榮光過受廣樂事勝彭佺玉陛回仙佩沙堤敞别筵國尤思柱石人盡羨神仙燕許文章大韋平事業聨鳴珂開竹里列㦸繼花磚黑髮仍枚卜黄扉更後先參苓慚藥籠桃李附蘭櫋皖水思徒結灊山夢日連青門楊栁色惆悵曉風前蓮洋詩鈔巻五
