body:
  text: 蓮洋詩鈔巻九詩餘蒲州吳雯撰咏檻竹卜算子何處玉玲瓏檻外清隂䕶帯露和烟似有情寫得離騷句屈曲籜龍根直上青雲去驚醒幽人卧北樓一陣湘潭雨雪中雁字青玉案凌雲賦就誰能和纔冩出驚天破鐫刻瑶華隨咳唾縱横姿態龍跳虎卧豈止如椽大長箋擬獻靈芝座又恐虚空遭㸃涴脂粉那堪供一抹仙人飛帛大書不錯筆陣横空過大風蝶戀花昨夜北風飜海水撲損簾旌欲住真無計無夢到家家萬里攬衣頻作三更起苦被浮名牽未已搃使名成華髪何滋味表聖祠東風物美白雲招我歸來矣和融谷望遠行牽牛花外濛濛雨愁絶江淹一賦鯉魚風近青雀舟横吹散髩絲如許酒客零星醉向長亭遠望正有賓鴻南去唱河梁又蚤青山將暮延竚屈指金門詞伯似病沈於今堪數八柱堂西伏波巖北驅爾三年閒住恰有柔奴作伴藤梢橘刺引出懷人句喜歸來便是去時愁處重陽九闋望江南重陽日斜照小銀箏擕酒偏宜高處醉尋詩好向菊邊行難得此朝晴重陽月又是半輪秋水霧蝕金流北垞海風吹玉貼南樓指㸃見滄洲重陽夜露下著衣寒蟲響漸教支枕聽花枝端合下簾看纔罷倚闌干重陽雨驟響入空庭斷續泥霑馳馬埒横斜聲亂䕶花鈴仔細把蕉聽重陽菊朶朶著精神密葉不須防醉客踈枝偏稱傍閒人冷韻特相親重陽酒新釀熟葡萄送處只愁霑翠袖翻時莫惜汚青袍痛飲讀離騷重陽客高卧海東頭靜處千竿風雨節閒中一笛海天秋整理釣鰲鈎重陽句㸃筆意閒閒戲馬臺前馳騁後藍田莊上醉醒間寫與小雙鬟重陽雁影入碧天斜紫塞霜前排錦字羅浮雪後踏梅花嘹嚦出朱霞蓮洋詩鈔巻九
