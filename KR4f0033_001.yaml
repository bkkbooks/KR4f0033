body:
  text: 蓮洋詩鈔巻一蒲州吴雯撰五古行行重行行離亭送君去三里聞馬聲五里馬無跡十里雲樹平嗟彼雲樹繁不知人有情乾坤靜如掌萬里見君行遙題王咸中石隖山房積水浮九州東南益蕩潏人家半洲島蘿篠互䝉密具區我舊游石隖君棲逸至今堯峰上猶上堯時日窻外一湖明階前衆山出春風散巖花細雨溜厓蜜仙靈每来徃真儒間儔匹表聖具生壙維摩得丈室泉聲四回抱嶺勢百崒嵂何日復贏糧為君訪衡泌岱路中作入山不五里景色凄以繁泉繞漢祠外雪明秦樹根狂飈晩藤落斜日溪禽喧悠悠游子心對之轉忘言時序既以殊寧不感鄉園馬上重歎息帶暝投孤村偶然作八首録四首世事日紛紜智者不能料所以古聖哲信心在吾道堅執無委蛇寳珠溷泥淖光輝究難掩終古具靈照風雷亦偶然天心發忠孝篤信徳之基勿使前人笑農夫何辛苦畊穫霜露間蠶女守桑筐一裙常不完嗟我纔知書坐食衣有綿天心豈見私遭逢或偶然苟不崇令徳是謂豢㝠頑讀史皆上口玩物䘮本原組織月露辭及物輸一錢何以報元化勉哉當體乾衛足亦有葵芘根亦有葛苟能慎道義何至墮險惡人生日詭隨趨避反成錯君子信固然天命有餘樂言行動天地擬議居其先因之成變化聖人皆勉然率意即為妄師心亦多偏良金須就冶質美形乃全江海苟無則終古悲狂瀾布帛固有幅窒慾垂至言竒氣尚收斂英雄歸大賢雜咏二首録一首讀書一萬巻寸衷轉茫昧將無昔人心翻在語言外聞見苦不多因貪反成害束書坐林間颯颯聞天籟柬陳説巖先生昨從太行來曾過先生舍髙松垂女蘿空山一繫馬京洛勞問訊陶陶樂情話身棲魏闕邊心在白雲下寄巢薇先生泰山何其髙滄海何其深我翁具偉抱髙據閬風岑鳴佩入天閶紫雲盪衣襟宇宙感太和喈喈鳯凰音蒼生引領望薄海霔祥霖繄余瓠落久徒傷年髩侵氷霜歴沍寒幸托喬木陰梧桐有繁枝竹實比兼金幾時敦行葦兼聆巻阿吟陽山落日山風吹長松亂清影白雲逗殘雪忽見前峰暝野鳥下寒竹孤僧汲修綆聊欲遂幽尋理策渡西嶺暮春雨中阮亭先生招同諸公集善果寺得曲字古寺城西隅寺路直還曲幽人此來徃漸與山僧熟煮茗石幢下石鼎輕烟覆一花餘春榮衆陰長夏緑松深鶴唳靜竹動鳥飛速人生一世間光景如轉燭宇宙曠無垠何為自刺促勝侣欣招邀佳時値休沐名香風過院仙梵雨垂屋向晩孤霞明白雲傍簷宿蒼蒼林月上世界明金粟歸途重回首遥山寄遐矚題張杞園浮家泛宅圖海氣何茫茫海風猶浩浩日上瑯琊臺孤霞在雲表常慕羽人都滄波肆幽討塵羈未得去屢負蒼蒼島之子水仙侣浮家謝機巧載書滿船頭雙鬟更娟好似戀鱖魚肥繋䌫近芳草風檣白鷺過雨舵垂楊掃何不便颯然竟訪成連道帆行黿鼉上青俯齊魯小世外見桃花千春不知老集阮亭先生宅得秉字冥冥花枝晩寥寥天宇静清言喜忘倦坐失春宵永風過堦草飜月動巢鶴醒蘭烟方爇案麝火恰明鼎醉墮席上杯渴憶山中井京洛去復来豈曰違夙秉願言晤親串聊取暢孤迥勞勞慕石隱買田不盈頃空泛洞庭波積雨愁舴艋山鬼頗便娟女蘿太幽冷人生分有定利鈍敢強騁早聞椎與槌幽薊别汝潁緣隨雙象馬夢謝頭綱餅物情蒼狗態世事孤鴻影倘未早識别無乃昧要領家門青蓮花嶽嶽插青冥吾將掃石壇坐卧南峰頂黄湄先生游太華山遂得結屋地賦贈車箱谷口雲白照松間路誰能訪叔卿巖竇一身度黄門具竒情振策御風歩萬仭入洪濛理勝境無怖壑轉晦明錯樹老丹青誤俯見蒼蒼原明河正東注驟雨忽飜瀑肘腋蛟螭怒須臾互長虹闗陜半呈露逕側脩竹倒石迸垂藤䕶相逢紫烟客目撃道皆寓齋房肉芝香石囷松花聚卜居志已得探幽坐成趣嗟我生勞勞入世每多懼夢繋毛女壇身逺將軍樹日日對晴蓮塵容自生妒何年便結隣同住雲生處西山詩㑹宿小山叢桂多石路晩尤曲為有看山約且共花間宿清言轉忘倦惟恐更漏促山鬼縁女蘿中夜媚幽獨傍曉望城闕微雨淡如沐黛色從西來青光繞茅屋把臂共欣然林風托遐矚出郭微雨既以過明霞互深淺出郭耳目易場圃紛在眼轆轤聲啞軋牽牛蔓宛轉野人烹葵蓼桑柘陰中飯對此惜勞生厚生生益逺太息理輕䇿風雲滿前巘摩訶庵鐘聲出林表日上羣鳥飛松際幻空色花龕影微微幽人坐煑茗山僧朝啓扉欲問無生義難同中上機宿香山寺溪橋蔓蔦蘿空香滿風磴洄洄泉溜滴坐對前峰暝松覆堦下石花墜雲中徑髙軒方偃眠泠泠度孤磬潭柘晩坐齋心至人離有無冺然衆機挫修持苟無力鬼神輙覷破嗚呼華嚴師冥心絶行作神龍不能見此地曽孤坐我来千載後道風想擔荷但恐纎塵隔虚空即㸃涴精誠發嚮往筋力愧孱愞白鹿階下行黄鳥花間過中宵梵唄聞肅然警偷惰孟榖宿白茅寺用少陵贊公土室韻成二首挑燈細讀不勝見獵之喜遂亦斐然有作幾日客中行却尋山中路王郎頗豪健惡馬横溪渡入谷四山合上月中庭素解衣各有適散坐盡成趣燒藥巖際訪採芝雲外歩天地喻指馬世代荒厨顧轉惜對花草誰能度寒沍心依紫竹林手折青松樹山情托猿鳥霞想變朝暮何處裛天漿仙人掌中露一夕山中宿心亂夢難靜曉来下山去日照青騾影廻戀此林幽仍苦前道永蒼䑕縁絶壁饑禽噪空井汗漫方逺渉何能遂夙秉風塵漸雜遝心性自孤廻上書罷游洛買田豈投潁家門有名山便與萬縁屏種秫隨西溪提壺任東嶺希夷老子在千仭蓮花頂再宿百泉重作薊門行小作薊門住西風昨夜来不辨泉與樹晨興益蕭爽頓爾慊心素淡淡浮雲盡𣺌𣺌飛鴻度牽牛寒有花葭菼晴多露境勝理自浹心賞目皆寓尚覺腰組煩未遂垂竿趣何處鳯鸞音徒然謝髙歩雜詩美人一端綺文彩美且良珍重惜剪裁藏之黄金箱一朝奉君子上衣下為裳榮華對知已顔色生輝光此心結三載徘徊立中堂何日理瑤瑟彈成雙鳯凰藝圃十二詠阮亭先生命作萊陽姜如農先生别業南村何須逺人境自無車馬跡叢薄日暉淺柴門淡將夕時有清風來藤花掃書格鶴柴清音警夜半竹露泫花井山人曉開門肅肅羽毛冷忽向九臯飛中庭亂松影紅鵞館幽人生滅已孤館閉空翠正有鵞王来聽講無生義嘗托陽羡籠不換山陰字乳魚亭種魚蓮塘下瀺灂蓮塘裏蓮塘朝復暮不住蘋風起一半緑楊枝隨風掠春水香草居托根在幽逕零落沍寒月春風来幾時一夜空中發望望緑無停清芬動超忽朝爽臺破曉石氣青清暉損千慮晨興攄逺抱理䇿髙䑓去遐矚方𣺌然直到雲生處浴鷗池藏機不肯来忘機不肯去泛泛緑波中悠悠淡無慮側翅入深荷池上山人語度香橋花源吹樵風濛濛過溪水有客石橋畔空香落懐裏只在水風間不辨從何起響月廊竹梧含夕暉風生碎珠玉不知新月上幽映修廊曲摇曳花林間禽聲墮空緑垂雲峰何處来孤嶂巉巖插花塢白雲乍徃還只在峰前聚蒼蒼園側陰天池墮毛羽六松軒偃仰長松下淵淵心若水不知歳月深且戀清陰美山雨忽飛来濤聲樹中起繡佛閣反聞聞自性萬有空氤氲稽首天人師寳閣栴檀熏一悟無為理不繡平原君秋日同葉九来徐勝力馮圃芝訪傅青主先生秉彛有同好言尋髙世士騎驢出國門語笑斜陽裏郭外風景殊蘆花冒秋水竟到野僧家喜値於陵子吟呻驚老病語弱不勝齒聞言頷耆舊拭目辨鄉里竹竈藥火温梧井菊泉駛庭前虚一琴床下閒雙履羔雁空招邀兒孫看坐起太息各無言歸途暮烟紫題徐芝仙為笨山舍人繪三大士像大海多波濤猶有大海見日日大海中波濤近洄漩此語雖親切依然成破綻性海萬法具寂寞生變幻山河與大地由来此中建帆檣何所用滲漏即淪陷達者即安穩止在能䕶念徐生妙筆墨冩此具方便舍人獨神解酬以三疋絹息心對應眞不用求彼㟁載瞻三大士逺離生贊歎嗟余何知識習深油着麵近始求解脱如拔骨中箭隨順蠲町畦浮沉寧汗漫苟未絶纎毫即已成間斷豈假黿鼉力莫畏魚龍難是法本平等恐怖自生患變相畫師為畫者色忽變如此顚倒想徒然資笑訕願共入無餘乗潮到鄉縣汪文升贈小楷五百字為别詩酬来美頡籀法已逺其意則未衰如何後世人競妍失前規篆體大小分上蔡牽犬兒書更簡㨗雲陽成導師中郎起陳留石室傳何竒破塚者誰氏嘔血窮藩籬瑯琊學簪花少作悔已遲晩年體一變方成龍虎姿江陵劫火然鵞羣蕩無遺所以句曲翁申辨窮毫釐畫讚存典型永興獨得之此語具懸解不必皆能知汪子鑿洪濛獨欲探希夷取勢必縱横天馬脱靷鞿有如狂與狷不屑中行馳豈知秘宻藏正自山陰施二月山桃開小雨細如絲吾將雨中去倦聽玲瓏詞吾子何為者送我隨斑騅題箋五百字木難贈臨岐君家有汪倫送客昔如斯君情較淺深潭水堪一巵鹿城有大尹此道頗精思吾過鹿城道盤礴互淋漓相見首相告不待他言辭善則與人同大美吾敢私留取古情性庶幾星雲垂鹿城大尹謂子文西城别墅詩十四首阮亭先生屬作花枝近女墻歳月日瀟灑雖復在城市喧寂非車馬清風迥穆如知希和彌寡石帆亭風動袈裟角洪濤四溟吼如何不動搖片石土囊口為賞正定心添種菱三畝放翁詞石帆山脚下菱三畝樵唱軒採山因采眞歸来發髙唱衣上烟霞斑雜坐無禮讓身忘草木年心寄尊盧上半偈閣大辨本忘言半偈又何著赤日東邊上素月西邊落不必更求心四大空索索石丈與世苦不諧聳削自突兀霜明耿介性雨見嶔㟢骨莫謂徳無隣有人具袍笏三峰白帝家門山何年竟飛去毛女發精靈欲共天孫語纎月見庚方産藥川源處小華子岡右丞禪悟人千秋生則傚每思茱萸沜一理欹湖櫂何意春城西犬吠夜如豹小善巻洞中過天地居然小善巻焚香聊宴坐獨理朱絲絃溪割罨畵水人畊陽羡田春草池池上茸茸色一巻離騷經謝客太荒唐幻夢不可聽愛煞懶公語春来草自青竹徑欹仄錦石路窈窕無凡卉去去緑陰中凉風動斐亹仙人何處来一萬青鸞尾雙松書塢讀書誰與共于䰄兩大夫更邀天際鶴營巢兼哺雛剛到春風候花飛醥玉壺大椿軒八千歳為春八千歳為秋靈根托天地世界眞蜉蝣何人知此意只可問莊周緑蘿書屋寂寂春陰繁因成元豹隱隔座花枝明到簾鳥聲近風牀書巻開幽人本無愠嘯臺蘇門有髙士求怒不可得出水終大笑妙意誠難測為想鳯鸞音崇䑓願矜式戴楓仲因夢作丹楓閣索題夢是何人夢覺是何人覺夢覺本不二分别乃大錯憶昔大鹵行嘗道昭餘郭野水方瀰漫雜樹正綽約宛然江上楓湛湛照寥廓何處尋歩屧且来渡略彴永懐托蒹葭髙卧阻猿鶴長安翻握手有如偕宿諾云結丹楓隱乃效夢中作幽𦕈滉金碧經營種花藥邀人夢中遊幻出覺時樂日月跳兩丸火風互磅礴世界齊指馬四禪即五濁飲酒與田獵衆生妄卜度參萬一成純背觸兩無著喜覺固為偏戀夢亦成縛夢覺俱不到可坐丹楓閣送陳子文之安邑丞維瓶處井睂纒徽不自如常有瓽櫑患提擲困泥塗爭似鴟夷幐滑稽大如壺亦自稱國噐方托於屬車嗟爾陳孟公潔清胡為乎長頭偉容貌昻藏八尺餘髙才坐憑几口占百函書贈我數尺牘藏弆等瑶瑜一朝佐山縣不得縱號呼羞乞狗監薦甘受長官驅我亦放意人俗間久湛浮索米向京洛歸夢無時無誰知中條山贊府先我趨巖翠落官舍桃花明驛厨努力勿廢事小文難大儒春明我當来歸訪城南隅已無尚書期投轄眞何拘看山過茅茨釣水尋菰蒲寧知叢莽間正復多酒徒堯舜已千鍾流傳皆百觚使君好與飲持螯帛裹鬚倒載入㕔事酩酊雙吏扶解酲鴦漿泉逺汲風蘇蘇何用苦束縛約身如朽株長短各自裁官爵難強圖封侯諒有定豈必皆區區一笑送君去方噪城門烏壬戌初秋寄于學憲憶昔客長安軟塵何浩浩金馬亦陸沈只夢舊山好歸来愜夙心豈敢怨枯槁讀書開北牕頗能任懐抱牽牛昨有花忽報秋風蚤惟苦奉饔飱不能具魚稻懐人向天末此意復誰道夫子眞瓊樹偏能識鳯饑乗槎歴南海棹拂孔鸞飛仍聞浮丘山靈苖發芳菲安得五色羊從之弄清暉秋空吹晴雲一雁珠江去寧忘假羽儀殷殷託心素洲通荔枝紅菴夢桄榔雨修敬久無階徒詠蒹葭句古意上阮亭先生四首録二首有桐嶧山陽貞朴含清音無言難自明樵㸑將與臨卓哉古賢達此際能幽尋削之以就噐緯之以成琴提携在捐棄誰能存此心清清沅江水宛宛衡湘蘭無人揚其芬幽谿空長歎一朝䝉採折芳香出林端流俗始知羡羣衆方解看咄咄非此人委棄春風寒古意柬徐勝力美人艷南國顔色如朝霞昨來耶溪上妒煞芙蓉花秦珠隨月滿越練逐風斜獨慕孤髙義今年尚浣紗秋日簡阮亭先生萬象本寂寥一心叢百垢至人心亦無萬象復何有先生金粟身方綰紫絲綬紅酣天女花緑醉麻姑酒妙思魚脱淵閒情風在桞嗟我三生縁虚懐邀善誘將無瓔珞街當年舊師友文字得閒居神龍困蝌蚪無學之學難還同証長久送趙伸符編修使山右凉風到庭户客子方宵征宵征亦何為日夕計王程斜陽見騶馭髙栁遲危旌遙遙發鳩水天際方廻瀠井陘百戰地殘壘鳴飛鼪闗路轉﨑嶇野潦猶縱横一日七十渡石齒何丁丁大鹵古仕國人文亦峥嶸君才本清眞為帝張八紘重賴獻納力闢門招豪英酒醴與笙簧所樂皆國楨嗟我邀末契華實無可呈幸藉少淹留不與璠璵爭有如明鏡前山精先遯形知人受上賞聊慰十年情簡謝方山比部牽牛寒有花芳草夕多露晨興遵廣陌凉風生髙樹謝公書成癖下簾理章句鄴侯三萬籖自插防錯誤我亦頻過從飲河滿即去十年困俯仰奔走念行路擔簦湘陰宿買舟漢陽渡苦思十畝間縁墻種𤓰瓠讀書消世態射獵飽山趣如何事願違又向金門住相逢益傾倒情語過親故亦云鹿角闗久負棲盤處春枝布榖飛雨壁蝸牛聚法曹覊鞅甚孤情少逸豫每值杏花時清夢往来數繪圖當卧遊退食輙長顧丈夫奮雄飛出處道皆寓正及身手健那得伴鷗鷺吾意早頺然山澤久沉痼貪看韋曲花笑躡東郭屨誰能借車馬君猶分坐具感慨成激昻風雲莽回互座有謫仙人請為鵬鳥賦贈姜西溟南海有菖蒲一寸而九節曾聞安期生服之入寥泬霓旌隨電轉飈輪逐風滅惟留阜鄉舄遂與世人絶吾生久頺放世事等一吷願言登羅浮竟訪還丹訣夫子純氣守上善無軌轍著書白玉堂走馬黄金埒衣被滿天下大道豈莊列鵬運九萬里五嶽俯一垤毎呼丹穴侣天漿共飲啜何日踏梅花千山望成雪呈徐健菴閣學二首嶰竹生太古堅笴一千尋外具蒼玉節中有鳯凰音何人解黄鍾律吕空消沉宇宙感太和採擇出中林一吹八風調再吹天地陰元鶴一十二遙下閬風岑上叶雲門奏中暢䕫龍心弇山有鳴鳥為世發禎祥其聲中律吕其色備文章如何猶苦饑寥濶空翺翔阿閣無安巢飛飛去扶桑大海多風濤白日黯晶光耳目眩爰居抗咮鳴髙崗夫子坐元圃琅玕紛羅將朝薦齋房芝暮陳金盤漿飲啄何足言髙義不可忘覽輝下千仭願言耀虞唐逢韓子用都下時方有婚事遂贈前年芳草時游楚戒行李相候岳陽城同渡瀟湘水舟移飛鷺上日暮啼猿起今春復里門馬上顔色温更向三巴去旌斾何翻翻豈意長安陌重來對霏屑尊酣新豐酒衣帶峨嵋雪聚散眞何常髩毛日已蒼君適桃李期方為鸞鳯翔屏間雙孔雀花際兩鴛鴦燕喜對晴昊差可慰懐抱而我踏層氷却望海門道㑹有好音來雲中下青鳥贈伯亮張司馬大運不可詰人生亦何常而我三年中春来皆異鄉前年風雨交扁舟入瀟湘經歳一歸来又復客汾陽今更留海壖依然垂空囊有如白鷗鳥流浪滄洲傍久客道益卑隨波空勞攘攬鏡自躊躇髩毛颯已蒼萬事無一成中懐祗摧藏逺慙荀奉倩近愧劉眞長閒中觀摴蒱亦輙遭謗傷夫子坦白衷襟度何汪洋能容叔夜懶兼恕次公狂灼灼紅梅開數為羅酒漿邀我賦新句氷綃墨淋浪醉中禮法踈調笑喧中堂小妓頗便娟新為墮馬粧輕歌斂紅袖能招雙鳯凰忽轉鳯將雛人謂陌上桑一座盡傾倒吾亦盈百觴回觴屬主人此樂殊未央耳熱舞甘蔗竒氣自飛揚何必求神仙逺索不死方今古争賢愚過眼皆粃糠遭逢豈力取徒爾攪中膓君看陰與晴明日即茫茫自儆浮世劇茫茫日作求死法貪癡猶不盡又問長生訣余尤業重者痛憤入心骨晨誦一卷經頻覺減内熱誓心不退轉洗滌到毛髪浮雲忽盡時露出青天月題汪玉輪太史看劍圖神物自可寳因之生愛惜何常有不平而始勤拂拭造化混洪爐虚無就形質晶光稍脱露已有通天色彩寧赤土發銛豈靈膏益百端銷落盡萬古一眞實蛟龍秘精爽神鬼潛辟易比之君子心氣應㽔賓鐵問橘北地多寒苦橘樹豈易生愛此華實好移植勞我情昨年霜雪時結茅覆溝塍雖然稍凋落翠碧留根莖春寒既以過盛夏必敷榮其如世縁驅正月我已行生理果何如馳書問柴荆屢從家問囑弟霞料理橘畦過悔人長安艱旅食望門足先斂惟有就君舍慷慨屢呼飯得匪王陽術獲此數豐腆君家漢之渚種蘭聞九畹梅花一百樹日日勞望眼苦被微名累徳輝難一覽君有覽輝山房不須盟雪霜又有盟霜舍且與計飽暖從此簿領間日日執手板方習士行勤難遂嵇康嬾我有文百軸零落失編纂感君意良厚許與事雕鏟凡此懐抱眞不同世情淺將無宫商應氣味有潛感所嗟氷霜時别緒轉難遣明日海門道悠悠自凌緬題王秋史苹二十四泉草堂圖江南陸慧曉楊栁在池上此水即醴泉此木即交讓闗西楊太尉曾傍阿對泉三公何潔白四世能名賢吾子有草堂二十四泉側不祝發禎祥但祝勵明徳題汪東山太史南浦送行圖參差江上山微茫浦中樹落日閉孤城幽人此中去去去入京國髙名振帝畿一隨丹鳯舞不逐白鷗飛芍藥號將離相贈春風裏豈知兆龍頭不肯兆龍尾秋草㟁邊緑春鴻天際斜鄉闗多少夢猶自遶蘆花詠梁史南嶽鄧先生衡嶺有居處自立兩板屋聊取蔽風雨斷榖三十年澗水服雲母日誦大洞經修敬每傴僂恭惟魏夫人白日果臨甫玉女三十人皆十七八許絳羅繡袿䙱乘雲集其所雖云有仙分篤實良所取求勞得則逸青鳥忽鳴舞香氣滿空山少日已冲舉集青雨山房咏几案二物小匡廬九疊玉屏風𣺌𣺌西江上如何几案間已具彭蠡賞猶好近香爐白雲自來徃湘竹筆牀参差狎管城縱横近書史斑留翡翠痕潔浣瀟湘水合傍玉臺人且載天隨子使院作岷峨雪已消春波洞庭滿愁心理歸棹日望南風轉湘蘭不可佩孤居悵凌緬方訝雉登木仍嗟蠶在繭堅卧抛陰符強飲墮金盌人生出處非百事已乖舛賢哲多苦辛不能自黽勉蛟虻與鸛鵲忽忽皆過眼颯㳫衡雲傍徒傷道謀淺雨中登岳陽樓白雲滿南嶽隨風來洞庭波濤仍接連坐失君山青却上岳陽樓愁心晩冥冥飛仙不可招殘堞盤饑鷹我生何勞苦萬里如流萍艱難思徃哲誰能安心形遙搴野竹緑俯掇春蘭馨千年花與草不獨怨湘靈城曲眺望朝遵城南路白石齒鑿鑿林中一鳥鳴江上幾帆落人家開竹扉樵子赴深壑塔影芳草間風來響鈴鐸别王旦先二月已將半江南雜花朶此時君不歸辜負閒中坐君言三日行行李已包裹生平愛好春盛事肯相左烟水緑濛濛雞籠迎畵舸玊蘭正髙倩垂楊復婀娜鶯聲一萬樹處處聽皆可東風動微波石瀬春帆簸我亦樂乗潮塵縁苦羈鎻夢想攝山居未得縱江柁何日便南下夙願一朝果更覔獻花巖巖中暢容我逢君迭主賓笑語江風墮萬事一微塵超然離偏頗姜伯逵過小圃看山即事種荷荷長葉種竹竹生笋小雨忽然至風緑接修畛之子具逺抱天機毎相引列坐見南山白雲正無盡肯作巖際行仙家多石廩贈汪舟次柬豹人今日汪贑榆當年桑柳州同一古性情不善干王侯小官就荒甸海氣浮危樓却有書千巻造化窮雕鎪朝吟祝其城暮閲劍水流黄熊看出沒畎羽聞嘲啾雲物任變幻烟花雜夷猶聖代廣八紘巖穴多冥搜聲華久傾動公府先見収一朝京洛來風吹日本裘回首鬱洲山逺抛青玊鈎天帝難驟謁金門還沉浮買書過慈仁聊作松下逰歸卧贊公房蕭然何所求囊米行且盡笑對雙平頭繄我比屋居小過輙相留誰人與酒錢遂能設二卣焦穫老狂客髙歌方不休時豹人先生亦寓寺屋亦復就君飲諧諺雜伶優苦云處逆旅無人彈箜篌裌衾夢鄉縣兒語成溫柔借問杜陵叟髙懐有此不人生真何常聚散難預謀十年最結想此地紛相投珍重良匪易莫惜頻勸酬明春知何如栁花吹作毬更化浮萍去相思空悠悠贈髙澹人舎人北風動天地銀河五尺氷仙人紫府居手携長春藤却看芙蓉花纔開一千層麒麟游靈囿鳯凰翔髙陵常有青童來送以無盡燈嗟爾搶榆鳥何如運海鵬蚤春同苕文先生及舟次大可天生夜集王崑良大參寓齋御河氷始開御栁鶯未囀鄠杜同覉栖春宵得良讌知交傾四海何必共鄉縣玉壺臘酒釃華燭羅屏顫王公負竒氣剛腸經百錬學詩似常侍一為即髙狷忘年謬推挹虚懐世希見勝侣盡招擕清言夜忘倦說士甘於肉況復潔羮饌嗟余縫襪材難添補衮線早歲罹㐫閔中年困貧賤近更慕無為理欲日交戰妄就承明廬終謝芙蓉殿還山搆草堂柴門俯春澗蘆笋過沙鷗楊花掠飛燕夢結崑崙頂閒編髙隱傳余嘗擬為道隱録擴髙士傳之不備也逺望周與召聲華在天半贈湯西崖江梅有鼎實辛苦髙人種委棄霜露間不作和羮用丈夫秉亮節得失何輕重且歌田舍酒暫歇賢臣頌持此少年自百錬始沉痛秋深石氣青木脱天宇空披襟仗瀟灑息念罷喧動歴想古賢豪大半出饑凍揮絃勸酒醪𣺌𣺌飛鴻送韋左司春遊堤草忽改色鍾山佳氣擁林暗車馬喧江影人家動纔見雙屐滑漸覺錦袍重散歩更遲遲時花已堪寵題周林於鷗塘種水圖四首朝畊塘上田晩啓塘上扉塘中一夜雨箇箇菱芡肥白鷗渾見慣不肯避人飛朝見藕花鮮暮見藕花盛採花兼採藕出水香逾静欲問種水人紅塵失名姓朝買魚妾来暮携魚子往䇿䇿復堂堂漸見魚兒長中有為龍魚一夜風雷上種水常苦肥種山常苦饑買山未必是買水未必非盍去丈人峯來往新婦磯繹堂先生齋中拜觀御書恭紀其盛世運適昌熾我皇膺寳命一心周四海深居必恭敬聖明無闕事百職罷諫諍徃徃萬幾暇游藝樂清静讀書到丙夜萬瓦金波映偶然事翰墨卓爾入神聖鬱勃蛟龍姿盤旋北斗柄載觀四大字心正筆皆正臣荃侍禁掖恩遇過韋孟宸章示寵渥稽首再稱慶光應千古垂事極千秋盛小臣田間來蟻蝨對金鏡瞻仰生戰慄嘖嘖歎遒勁愧乏掞天才作頌施無竟和别王東觀出門春草深入谷夏鶯滿客子思故鄉去去不能緩忽忽事行邁悠悠增别心天涯非所難所難新知音惓我西山樵愧爾東䝉客百年如流水歡此數晨夕重損瑶華贈商絃風蕭蕭慘然元㶚水四月垂楊凋君言汾陽來我正汾陽去一帶藐姑山各覔題詩處張水部修雷氏琴製琴昔何人遺噐留千載得者驚摩挲躊躇感時代宇宙浩茫茫日月没蒼靄藏舟向大壑交臂失所在所以古至人錬精除粗穢斯琴固斑駁中聲托其内解散復膠漆重類開草昧曽聞伐毛髓仙術肆陶汰修琴不修人吁嗟發長慨揮弦送飛鴻吾欲吞沆瀣次趙城向曉郭門北蒼烟濕流水嶽嶽霍太山青光落行李生平愛巖阿未得脫塵滓看山半馬上次第藤蘿美黄金苦不成紫海渺萬里人生皆碌碌蹉跎遂没齒遥期婚嫁畢曽孫又生子一笑松雲前早圖飯石髓玉溪宴集竹林俯春澗林下東風吹人生無百年為樂須及時良朋接阡陌相招同來兹烹羊設醇醪坐席歡更移耳熱行南原徘徊至東菑西望太華巔風雲變參差雪殘毛女洞日下希夷祠古今幾旦暮盛滿不可持酒䦨吾已醉欲採商山芝遊風穴簡陸雲士汝州風穴寺城西白雲裏出郭芳草深得此林壑美栢子周四山桐花通一水香閣接幽巖僧飯資禪喜石潭見空性澄澈何終始潭上新笋生潭下舊蘭紫谿風吹午鐘脱然謝糠粃相逢采山人念爾宦游子西園宴集二首録一首峩峩九峰秀人家山水半草堂誰結搆幽思玉溪畔相過忘主客石上青精飯雲來松際陰泉到竹根散美人雙荷葉嬌歌再三勸莫惜金縷衣浮生幾昏旦簡方山先生浮名久為累悠悠究何成因之河山陽買田事躬畊春雨苦不足澤雁紛縱横始知饑驅縁難與造物争再作京洛遊朱門羞將迎僻居守寂寞豈曰全堅貞夫子獨愛我始終無世情惟兹孟秋月蜻蛚時一鳴騎馬特相過喜趂今朝晴大藥本無術至道思乃精吾欲溯元化同奏緱山笙將歸中條呈阮亭先生三首録一首玉露下庭樹桂醑紛具陳再拜稱百觴願祝千萬春世道日輕薄砥柱望天民庶幾位台輔坐令皇風醇題袁士旦小照即以為别二月來京師京塵何浩浩昨日凉風至只覺還山好之子雲鶴姿讀書窮要𦕈衣拂敬亭雲酒醒新豐道匆匆得握手眞快機縁巧風前倚轆轤意氣切雲表畵師復何人精思入窈窕能冩慷慨胸玉立傍修篠恨不擕之去空谷伴清曉世事閲始深大道求愈杳不敢天下先苦縣昔所寳願以贈臨岐堅貞永相保香泉香泉鹿城大忍寺泉也陳子文使君飲而甘之搆亭其上名之曰香泉余過題詩遂以為别乳窟有蝙蝠千歲化為白微軀何足戀生理尚知惜嗟哉丈夫身昻藏儼七尺胡為競貪冐天機日狼籍甚愛必大費珠玊歎輕擲十月鹿城道小憇越阡陌偶酌泉水香感慨風生腋將無無熱池於兹潛逺脉使君具懸解搆亭著雙屐銀瓶汲鉛華石鼎錬金液倐忽得要妙疾如馬馳驛更喜金界近寳閣鎮潮汐碑古薤倒披經富蓮横積寺有𨽻碑甚古全藏一部積篋中恨不謝塵累久住濯精魄纓組君正煩饑凍我方迫題詩留碧玉灑酒振歸翮一水一切水浮幢何間隔大道本無負交臂豈創獲兩兩素心存終古照泉石春雪曉望宻霰夜已零杳靄漕河路朝來南浦望誰躡東郭屨柴門半隱顯靜掩溪邉樹一鳥破烟飛有人雪中渡古芝山房詩為劉敬亭賦余家大河上門對蓮華峰一日十二時常把青芙蓉欲作采真游幽懐苦未從之子中壘後五嶽具竒抱早嗜神農書晩契商山好曽不一縑值已得三秀草靈根産何年其色古而腴一機妙出入元化與之俱毛女不敢餌留之千載餘神物鬼所秘豈溷韓康市一朝不自愛實為君子至供之齋房中足辦一生事簡方山謝先生下簾坐清晝讀書緬前哲如何寂寞人屢煩長者轍花林共偃仰風磴互蹩躠烟羃春松暗鶴踏老槐折不知芳草意勾萌幾甲拆萬物機出入一法杜生滅朝來惠佳句清思濯氷雪海日上曈曨髙吟動寥泬石潭夜泊烟盡北斗垂明河淡秋影石潭泊舟處風篠娟娟靜閒鐘渡水歇宿鳥投林猛素瀨見漁燈花枝坐中暝贈竹垞二首三日讀君詩五日見君面不謁門下省已出瑶林殿浮榮何足惜世事本多變莫便學班姬秋風泣紈扇曲巷浮埃多相尋日已昃感君不得意猶有好顔色豈非十年内得此讀書力握手當路岐不負昔相識簡楞香兄哲兄瑶林姿髙文久彪炳朝辭新安江暮入金華省承恩歸屢晏日過花磚影幽齋富圖籍下簾心逾静賦成金石墮書就龍蛇騁一字落人間已與瑚璉並頗驚裘馬客造門日求請繄余昭穆分親愛同氣等風軒杯毎接雨院燭常秉無學資髙深有言聞要領池塘芳草時誰能和孤迥還當數過從花林鬪新茗過介休郭有道祠見傅公他𨽻書中郎舊誄歎美不已紀以詩繋馬古槐下槐花石堂偏誰書有道碑古法蛟龍纒其文中郎舊書亦堪比肩嗟哉濁堂老縱横照秋烟鴻都蹟久蕪帷幕留殘鐫夏承誰呵䕶靈光猶巋然巍巍九疑頌託跡於神仙此碑妙接武絶響續千年梁鵠鄙不為頡籀或後先我來重歎息典型欣目前坐卧欲三日苦被塵累牽上馬再回首孤鵬方髙騫題趙叟小秋善琴共城有一士七十無心想家依嘯䑓側門開百泉上竹裏毎醉卧山中或獨徃但携一壺酒不知屐幾兩有時揮五絃萬壑秋濤響我昔泉上游久欲就蒼莽買山苦未就徒然増慨慷相逢感夙心且與共偃仰白石精舍初日寺門暄微風塔鈴響巖氷餘滴瀝谷鳥悦深廣樵聲來逺壑竹影交銀牓寂寂下庭陰回身禮金像兀坐兀兀寡人事寂寂忘心想閒臨庭户間坐看春雲上竹樹頗陰蔚烟水亦沆漭鶯聲過喬木鶴子下菰蔣忘機復何言遂已窺象罔過巢溪巢溪清見底白日如摴蒱水禽各鳴喚兩兩機心無殘雪沿溪流轉入汾水隅天氣漸和柔蔣芽生紫腴感此時序遷况復景物殊古人不可見對兹心躊躇過孫向辰書屋幾日不相過新笋已成竹竹間兩黄鳥飛遶讀書屋我來北窻下愛爾詩盈束何當携素琴共掃清陰宿秋日即事閉門賦閒居隂雨連朝夕今朝晴稍開遂至原南北汨汨碧流駛漠漠秋烟織登眺頗俱宜欣賞良非一白雲忽欲盡了辨前山色農人腰䥥歸穉子荷蓑立擬古春風到庭户百草皆知榮此心不如草寂寞從中生曉起閨房暗羅衣寒盈盈故人在他縣憂喜難分明婉彼燕趙女把酒勸聽鶯華筵不能久反増離别情念此轉憐惜何事客中行勸酒東海日曈曨光輝遍林藪借問晞髪翁此日何年有連朝北風惡氷合直沽口却憶海上山山中雪應厚黄精苖有無欲劚但囬首不如層氷下生魚比纎手鑿氷下絲網素鱗燦堪數薦之白玉盤盤魚色難剖請得魚一頭可勸酒一斗一斗復一斗醉倒洪崖友囬看東海日又上牕前桞銅雀妓銅雀䑓漳河岸歌舞出彩雲散可憐人君不見不見奈君何漳河揚素波日暮悲風起秋聲何處多陵樹晩烟織松檟紛無色帷幕棲寒陰君王夢難識願將妾私淚啼作西陵雨何以至君前野風為吹去蓮洋詩鈔卷一
