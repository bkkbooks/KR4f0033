body:
  text: 蓮洋詩鈔卷四蒲州吳雯撰七律霽公次壁刻金釋重公韻索和即答年華忽忽鬢絲秋下澤常思馬少遊髙詠喜聞清似鶴好山驚見翠如虬名心難遣千年妄世事誰為第一流今日追陪龍象後髻珠可許付裴休魏惟度留飲即贈汴栁當門映索居名山心事近何如琴樽尚自能留客風雨何曾厭著書不少塗泥悲騕裊並無鐘鼓溷爰居蚊虻鸛雀須臾過那用臨淵羡大魚寄黃經公曾拌官舍醉如泥别後柴門掩玉溪樹下茅容原有母間居潘嶽已無妻當年情事悲鴻爪近日文章愛馬蹄彈指韶光驚過眼幾時靈藥就刀圭葦亭即事蘆葉一叢還兩叢後園散坐見飛鴻階泥著草昨宵雨簷網惹花今日風便可彈碁開白夾那教踏箭趂黃驄女墻王屋晴逾好都付狂歌痛飲中陪僉憲伯登九山寺同姚綏仲孝亷二首百折崟崎磴道長天風萬里浩茫茫已攀絶頂九青髻回見一泉千緑楊雨自僧厨歸石井花從樵路散寒香周遭碧玉屏風疊誰把匡廬借太行矗矗松門傍日開山前車馬漫徘徊洞中誰貯千秋雪杖底爭喧萬壑雷澗道猶傳龍女過珠幢方見鴈王來三生合受金人偈忍别翻經百尺臺相州初寒昨日北風寒有信今朝東閣夢無端衣裳在客寧辭薄嵗月因愁轉見難才子恐教傳鄴下名倡爭説盛邯鄲蕭蕭荻葦三臺沒願乞仙人藥一丸宿少林寺寶閣崔嵬明海霞香林四月娑羅花子規啼時山霧暝怖鴿飛處松枝斜夢本非真尚顛倒心不可得何正邪若解大千同掌果便應常住法王家送楊南城出守劒州安陵消息近如何拜得新恩慷慨多逺水逺山通洱海春風春雨下牂牁三更鵝鴨裴中立萬里旌旗馬伏波豈但長卿能諭蜀天威先靖夜郎戈别陳顒士一載追陪笑語同可憐岐路洛城東傷心澗水兼瀍水落日南宫更北宫氣誼暫教違貢禹文章遙望薦揚雄何年金谷園中醉重對荷花一頃風别潘殿升入望中條決計還君亦將去龍眠山文章誰信已無價世事何年方得間酌酒南宫北宮外分手朱雀蒼龍間相思各憶天津水五月浮橋下白鷴讀東坡種菜詩因成一首頗有城隅傍井田瓜花楝實每清妍不煩更借參軍地便已能當宰相錢早韭剪來新雨後晚菘劚向早霜前兼聞此味須常有休論東坡仕宦年九日同諸公登髙蘆荻蕭蕭木葉摧他鄉猶得此登臺舊山愁絶二千里客席端應三百杯叢菊有情人醉後髙天無際鴈飛來樽前多少金門客盡是西京作賦才初春風雪過趙天篤兩日東風寒較甚今朝飛雪漸交加湖邊新栁正挼線山畔殘梅猶弄花鳥語聽來無次第草痕望去已橫斜幾年夢想特相問騎馬過溪冰墜沙題姚玊階西湖感舊詩後六橋煙栁拂衣塵蘇小墳前芳草新寶馬香車空有約風裳水珮總無因神傷偏在湖邊路情鍾方為我輩人更有誰來作寒食梨花如雪認前身仲春三日雪和愚山先生韻入望空明雜曉暉隨風故故撲簾扉階前栁絮爭相掠嶺上梅花信久違塞馬霑蹄連夜獵春鴻留爪隔年歸鷫鸘莫便遂沽酒又早重穿貂鼠衣貽洪昉思不耐悠悠世上名薜蘿深處有誰爭能通彼我間千古才著成虧恨一生廣漢何妨貧折象壺山竊願隱樊英年來真見忘機好非借雲林寄不平再示昉思世事從來少定形須彌未可爇飛螢鷇音有辨復無辨鯤化南溟更北溟欲殺何嘗非李白聞歌誰更識秦青豕零雞壅當時藥暴貴新傳又茯苓贈朱悔人學耕東浦雙鳩呼雨又呼晴東浦何人正餉耕蟹舍遙連平楚白柴門俯見下江清燒畬侵曉驅牛出飲社連朝荷鍤行莫訝逃名名轉盛耒邊終有漢書聲逢王子重吏部京師即回秣陵省覲藤花官舍日從容相憶長吟對澗松七載誰憐花下别三春還喜寺前逢新詩逺帶峨嵋雪子重有使蜀詩最竒歸棹方迎白下鍾為拜山公道珍重獻花巖北待相從沈洪生編修宅集諸子看芍藥四首靈根曾説託豐臺新買千枝傍座開楊氏諸姨同輩出趙家姊妹兩宫來東西客到四千里賢聖酒傾三百杯為戀髙情忘卜夜四更燈火不知回旖旎爭看疊畫屏靈妃髣佛下雲軿憐時那便分桓李妒處何從較尹邢名酒逺將阿母醖盤餐羞薦五侯鯖浮生此樂真何極莫遣當筵錦瑟停肩拍洪崖笑語同長吟促坐鳳城東酒當璧月清涼夜人在瑤臺錦繡中畫檻緣階香有露珠簾到地靜無風欲歸更覔銀缸照愛煞深紅雜淺紅欲去還留繞曲廊酒人被酒更清狂舞當芳樹驚烏鵲歌倚洞簫來鳳凰花氣濛濛寧惹霧爐煙裊裊尚焚香莫愁那得頻相接只許盧家有畫堂六皆兄招諸子集蠖菴侍御宅鳳炬輝輝照畫堂秋深終是感他鄉琴樽尚戀嚴公宅畚鍤誰操谷口莊豈為上書留北闕猶思取婦溷東方愁來魯酒都無用坐聽西風鴈一行送曾青藜之粵東二首録一首天邊才識少微星欲别還擕雙玊瓶東閣連朝方罷酒南人從此更傳經春回黎母花前艷雨過金鼇海外青珍重家人問消息平安先報錦帆涇呈少宰李容齋先生次第朱門影寂寥霜天感激更相招盤餐誰暇謀寒士啓事公猶重聖朝橘樹當奴供玉案雪花如掌避金貂座中不少知恩客一飯從來未易消贈黃六吉十年令望歎無雙親見風流意益降的有公才比東漢更開詩𣲖振西江青春索句王孫草遲日攤書玊女窗最感天涯知己在莫辭沈醉續蘭缸贈武建侯海風吹雨又吹晴漸次桐花接坐生醉後倚闌看點筆狂來别院試彈筝滄洲意氣朝雲上鄠杜聲華晝錦行好在鴨頭潮水緑不須酒渴憶江清斐然納姬清秋誰和杜秋詩寂寞樊川惱鬢絲剛遇桂輪生魄日恰逢桃葉渡江時漫言春到花盈樹還看陰成子滿枝佳事合題三婦艷中堂樂任主人為顧梁汾舍人自製竹罏攜至都下客爭賦之余亦為詩二首兼道别意用原韻録一首竹爐活火夜猶然夢繞吳淞水石邊塞上風塵逢舊製江南榆栁憶新煙山移明月空猿鶴洞改桃花幾嵗年認取廬山真面目天涯隨處谷簾泉和答漢儀旭菴升也雪後遊萬因寺之作有序蓋聞右丞髙寄曾開鹿苑之基江令修心亦憩龍華之館是以通人曠士每託興於林丘羇客勞人宜遊心於禪悅況乎峰連仙掌水映河圖剎留龍象之居碣表隋唐之字山條水葉忽迎寶馬之來雲寢風棲暫息名賢之駕結勝因於世外播佳句於人間側仰風徽彌增歡喜晴沙擁路悵未聨金地之遊霽雪當軒但遙􅘦玉山之照勉成四韻用附千秋云爾日上髙林徹曙鐘看山結騎得從容春泉乍動花邊屋殘雪新消竹外峰苔徑通時羣鳥散石門開處一僧逢幽尋最有柴桑癖白社今朝悵未從登樓次木厈韻即簡甜雪二首録一首灝氣常思契混茫眼前原不異洪荒坐來虛室能生白養就金鵝漸褪黃百折世情堅道力幾回心事盡名場憑闌究取雲生處瓔珞街前認舊鄉次韻答韓文尚亦不辭名不近名偶然相見即相傾休論金馬浮沈事且對玊壺春酒清大藥終思還舊我名山豈敢負新盟論文連日花前醉只覺人間尚有情贈劉西谷侍御二首當年同醉荷花酒今日來過楊栁津奉使已為驄馬客論詩仍是玉堂人文章海內原無敵道素河干久作鄰更向治平求第一維揚政績兩嶙峋令弟自翰林出守揚州久向山中怨索居半雞何庋更無餘春來嬉戲思文褓花下追隨愧板輿織素織縑機總廢桃根桃葉事全虛吳娃應踐當年諾待與康成理架書津門喜逢徐師魯即送之山東健翁子海畔相逢笑語溫惓懷今昔道終存看花乍可稱新契對酒仍教説舊恩事業此時歸鳳沼文章千載溯龍門匆匆又作河梁别日觀峰前役夢魂再貽子載愛爾英姿不世情矯然龍性掣長鯨陰符帳裏再三讀寶劒匣中猶一鳴學得飛仙能控鶴擕來中婦善調箏何年已就還山約同向金蓮頂上行送友人滇南省親萬里騰鶱意氣雄烏衣門閥重江東蘭橈正羡乘風便春殿猶傳奏賦工青草湖光迎彩筆點蒼山色撲黃驄芰荷香裏趨庭早會看西南海照紅將發潭州阻風江風三日且不息愁倚江閣衣裳單日暮魚龍爭出沒雲垂水石生空寒欲去尚戀賈傅井到家還近毛女壇若問湖南好風景棲巖紅樹九秋看贈張太守愚谷二首録一首長夏髙齋擁賜書南風吹過北窗虛剛腸百鍊能容物英論千回倍起余郭外蓮塘藏白鷺階前酒甕擲金魚幾回話到郎君谷修竹南頭好結廬蓼花嫋嫋秋光映野姿依依踈幹對寒漪方看數縷花開處漸近長空雁過時風動白蘋偏弄影雨交紅樹半垂枝浦中荷葉還如鏡相伴前汀晚更宜戊寅初春簡張厚卿廣文厚卿畜妾甚多長治人春雲陰陰將作雪重慰新年望嵗心將有鶯聲變寒谷豈辭臘酒對髙林牙籖暖傍珊瑚架花勝嬌分玳瑁簪更喜日長無一事課書香閣寫來禽題孟伯人小照碧山堂乃伯人園中堂名也碧山山色正氤氲山下髙松更不羣幾次山堂常載酒每於松徑數逢君棲巖寺裏僧同話鄭谷莊前鶴共聞尤羡文章可華國白雲他日到青雲吳門初春聞道江干冰漸消眼看芳草坐無聊酒杯縱使愁中得春色終難客裏消山鳥漫吟泥滑滑吳娘偏唱雨瀟瀟歸時借問金陵路桃葉新添幾尺潮聞喜雨後簡楓仲雨後殘陽髙樹間豆花覆井桔橰間涼風徐度溪邊寺宿霧才收郭外山每惜勞生仍遠道難將大藥駐衰顔相逢且撤河汾席塔院東頭看白鷴水村林葉蕭蕭欲暮天人家煙火夕陽邊寒瓜引蔓垂茅屋野水生波入稻田漁網懸來晴樹外釣車牽過晚洲前圓沙鷗鷺忘機甚隊隊菰蒲自在眠贈孫都閫瘴雨蠻煙海嶠清雄才從事伏波營雕戈曉指春星淡獵馬宵還臘雪明北闕千秋方鑄鼎南天萬里已消兵霜華點鬢休相訝二十年來大將名水村萬樹垂楊緑不齊人家住在澗東西新篁迸玉方連屋嫩荇如錢乍點溪野墅客還忘閉户晴沙屐過不沾泥風光都似招賢里只少紅翎水鶴啼重過故關關門芳草寺門鐘石磴盤桓感舊蹤白日回看天路逺青山喜似故人逢樓臺傍曉開巖户雷雨淩晨過澗松為愛紛紛紅蕊亂翠禽銜下碧芙蓉間居示內十年宦學兩無成且共山南事耦耕可向田間隨冀缺幾曾床下拜樊英提筐蠶月勞機杼采藥鹿門忘姓名若使蓬山同有籍玉簫雙引鳳凰聲村居莫向村居厭寂寥緑楊千樹繞蘭臯河聲卧聽崑崙遠嶽色晴瞻太華髙岸上桃花如綬帶溪邊芳草似青袍晚來猶好垂竿在一線清風引六鼇題嶺祠半嶺間雲祠樹多野人心事近如何黃龍釀雨飛巖窟白鹿銜花過薜蘿石上方抄雲子飯溪邊誰和紫芝歌年來空有還丹訣日遣流光等逝波河上望永樂歷歷然感咏河勢衝冰水倒回兩山寒色逼人來鄉園雲樹雖相望客路心魂轉更哀倦馬爭投盤豆驛飢烏空噪赫連臺勞生碌碌真何益欲訪盧敖鍊玉胎江樓寄懷宋中故人二月春歸楊栁條廣陵風雨日蕭蕭題詩不到忘憂館走馬何年海雁橋江上歸心憐草色城邊晚景惜花朝梁園賓客天涯在空聽鐘聲落暮潮韓維藩兄偕令弟文尚買荷花數柄招同沈竹西客子張鳯舉集賞分賦得支字時别客子已十年計共維藩城南飲射時已五年矣勝客招攜繼渼陂荷花恰有兩三枝香來便覺風前好露重何須水面時一座盡看人似玉十年獨笑鬢成絲射堂却憶垂楊郭畫戟猶能中小支送魯庵之黔西二首録一首使君持節擁雙旌慷慨今為萬里行眼底江山遵驛路天邊雨雪計王程瘴花開處賨人侯蠻樹交時島吏迎最是聖朝威德重旬宣從此倍聲名贈寧觀齋太史騎馬衝泥擁鼻吟相過常得散煩襟題箋久廢間情賦對酒欣調太古琴忽念湖田應有夢尚依金馬本無心荀陳風味西州淚三十年來擬再尋論書答子文大尹句曲論書已杳茫江陵劫火更凋傷參差曇􅙓鵝羣字顛倒山陰貍骨方撥鐙微言寧石室畫沙真諦豈雲陽傳疑傳信須裁取莫但隨人築道傍寄江辰六郡守三首録一首大道微茫不可尋極尋常處易浮沈讀書未便傷無用為善何妨是有心筆勢漫從愁裏廢天機且向靜中吟邇來生計渾如此肯向南風慰好音坐看坐看山雲意態遲釀成新雨到花枝盛來寶硯三危露寫出幽人七字詩紅藥香中蠶浴後緑槐陰裏燕巢時晚晴誰辦樊川賦只許當年杜牧之寄山中人荷衣蕙帶山中好頗念花時獨往來應有肉芝供晚膳定逢石髓助晨杯人間萬事驚鴻爪園客三春薦鹿胎遣有涉無費斟酌莫將新賦汚天台薑華林郡司馬得紅泥燕子將之句命同人賦之走筆應教飛花無數委前溪雨雨風風打作泥紫幕最堪添舊壘雕梁偏稱作新棲水邊啄得紅襟重栁外銜來繡翮低多少佳人喜相待珠簾高捲立香閨贈宋騻先生平夢想峩眉好君在峩眉住幾年佛火飛來輕似葉香雲生處白於綿道心已熟龍歸峽定力方堅虎擘泉今日相逢如伴侶可能重問蜀江邊山行即事姑射山前三日行秋林落葉亂泉聲藕花已老榖登市牛力方新人餉耕冰雪逺成仙客夢桑田近見使君清徘徊蘆荻蕭蕭夜汾水東頭雁影橫宿吳山寺樓簡嚴灝亭先生蕭蕭暮雨急寒榛獨倚髙樓少四鄰江上黿鼉悲鼓角下方燈火散星辰梅花何處三更笛寒食無家萬里人不是相逢嚴僕射天涯誰念草堂貧齋居瓠落何須慮大樽蕭然無客欵柴門春秋未習嚴彭祖紀傳常輕褚少孫下澤幾曾驅欵段長河終擬溯崑崙雷聲太白連朝急次第墻東過雨痕閣學李湘北先生有聖代求賢之作傳和紛然酒次出以見示余自揆謭劣何能揚扢盛事但自述所遭而已并呈先生四首徑開鼪鼬學鄰虛巖壑朝朝信所如聖代自多優異詔微才真愧治安書觀光未敢違先達作賦還當念遂初回首舊山冷猿鶴桃花流水亂春渠故人清切白雲司愛我陽春郢上詞苦欲上書共徐樂不教下第歎丘為陽居久矣忘爭席司馬何須更入資看取淩雲新賦好幾人先到鳳凰池十年曾著逺遊冠辛苦真同蜀道難頗有文章窺賈誼實無鹽鐵比桓寬金甌本自無傷缺玉壘方期早奠安頓使河清頻入頌君王含笑五雲端鄉里常隨馬少遊上公偏有白雲求可能輦下留方朔先使人間笑許由草野那知千古事朝廷自有八紘收玉杯漫道天人策牧豕公孫萬户侯寄贈吳武陵四首録二首憶昔熊湘早濟師曾同草檄佐軍麾久從磨楯窺英略更向投戈得素知粵嶠盡開唐節度沅波已斂漢旌旗承恩却綰麟符重玉帶河邊聽竹枝矯矯雙鳬漢殿邊元龍湖海氣依然才優曼倩三千牘道長萇𢎞十五篇官舍從容間對鶴南風披拂靜揮絃緑蘿自此無招隱不種桃花種稻田戲為西崑體二首鐵鎖髙垂閉綺寮蘂珠宫裏上真朝梅花只許留宮額楊栁誰教綰細腰檻底芙蓉歸寶鏡簾前春雨得生綃傷心最有秦樓客隔斷紅雲聽玊簫朱雀忩前曉色開玉鈎窈窕碧綃回日髙有客看花去夜半何人鳴彈來故把秦箏迎醉拂漫將越練就燈裁春風十里耶溪路網得西施不用媒平遙野望極目平原宿草衰無邊春色鴈門來縱橫野水灌嬰廟突兀寒煙吉甫臺繞指當年存苦語聞雞何處見竒才晚來浣得愁千斛仗有葡萄新撥醅聞阮亭先生由户部郎中改官侍從二首琅琊家學本無窮天挺英姿更不同事業已聞多際會文章今始見推崇宮人盡説元才子天子頻遷戴侍中入直那教早歸院金蓮常撤御筵紅頻道新除下九天相過特地一欣然敢云賢人五百里的有才名三十年從此但棲天祿閣不須更算水衡錢由來奬士玄暉癖猶問人間寶劍篇某上人禮清涼歸雁門迢遞訪三車稽首清涼鍊鏌釾去日但擕鐵如意歸時却採金蓮花毒龍制後爭投鉢猛虎騎來竟到家回首戒壇石上月清暉依舊滿袈裟再過有道阡有道芳阡接翠微石門松檜只依依風吹葵麥鼪鼯出日下祠堂蝙蝠飛墊角何人爭慕義瞻烏誰屋早知機九原應使先生笑輦路而今走布衣簡張迥凡間坐髙齋日幾回秋花遍向小山開檻前最愛涼風入天際剛逢早雁來竒字問時宜載酒雄文草就許登臺每當憂樂關心處知爾真堪宰相材寄薑西溟四首録二首名世由來道不孤鵬飛今已振天衢宫花偏向簮時艷鞾笏方從殿上趣蓋代文章原有價掀天事業豈無徒大才難用真為用不復長歌擊唾壺幾載銅龍自慨慷一朝重致姓名揚蘭因出谷香尤逺橘以過淮味更長爭喜青雲真得路休言白首只為郎家風亮節傳青簡再見新梧振鳳凰西子華林薑公屬賦響屧廊前夜月孤苧蘿村畔沒寒蕪已教舊恨傷麋鹿又肯新愁入􅀈鴣鐵網皆云沈寂寞黃金任爾鑄糢糊江東救得無餘事那復扁舟共五湖明妃不把黃金買畫工進身羞與自媒同始知絶代佳人意即有千秋國士風環珮幾曾歸夜月琵琶惟許託賓鴻天心特為留青冢春色年年似漢宫緑珠蓋代貞心蓋代姿鮫珠百斛價難追已拌知已偕金谷豈肯才人嫁養厮璧月沈時香未冷彩雲散後夢何之當年也有翾風侶不識春風又付誰太真人間天上兩茫茫傾國傾城恨最長何處玉妃留别院尚教亭子憶沈香漢宫自喜同飛燕春色爭誇似海棠七夕牽牛私誓在同心願只屬三郎虞姬楚歌一夜動悲涼百戰空嗟霸業荒子弟皆知歸長者美人獨解報君王江東日落垓塵散原上春歸墓草香回首五陵煙樹盡千秋同作恨茫茫詠白梅四首録二首冰天曲屈託靈根猶喜春風入坐溫繡幕燈來才有影雕忩月到更無痕香浮東閣仙郎宅夢入江南處士村醉後不辭頻酹酒也同玉女洗頭盆南枝不用悵無媒早向春前次第開燭暈紅時明獺髓蟬光滿處長珠胎當筵恰對一峰雪照水何須兩岸苔珍重纎塵都不到巡簷那許凍禽猜贈孫次園二首録一首七十二峰江上頭松雲拋却舊山秋孤懷恥傍三千客俠氣常輕萬户侯鼎裏丹砂烹上藥機中錦字感新愁無端又遇穿針節不向舒州向冀州城南晚歸即事曲江買酒不成醉歸騎縱橫散野坰日暮波光吞岸白雨餘山色逼人青紫叉紅袖花邊郭翠箔珠簾水上亭興盡城南仍秉燭夜闌重市五侯鯖長安喜遇孫愷士前輩衮衮才名鵷鷺班幾年江上有餘間暫拋紫府花前宴又看青門雨後山久别各言魂夢熟相逢都訝鬢毛斑難爭只有千秋業不與流光共往還簡長安謝靜巖大令終南荏苒三年住時有青光照畫簷羈思只須遊子領風流偏讓使君兼花前吏散親調鶴竹裏人歸自捲簾今日方能到廳事可曾先動客星占重陽中條紅樹重陽節林下何人醉菊花海霧昏昏釀作雨漁燈點點看成霞多愁且與消書帙有夢無端攪暮笳世事東西難自料髙天風急鴈行斜潞河簡宋僉憲時讀其近詩甚竒鬱不勝折衷江上猶傳宋玉名花開韋杜引雙旌詩過青海才逾壯遊入盤山夢亦清直道真消蛟蜃氣仁風方感鳳凰聲西江篇體淵源識仗與琅琊共主盟寄盛悔亭悔亭姑蘇人流寓芮城之朱侶村者已三十年矣巖分懸霤趂晴嵐羡爾溪東寄一龕桃葉不須思白下梅花儘許似江南忩含晴雪書偏妙坐擁青山賦正酣珍重題箋報寒食詩名酒德兩無慚柬宋牧仲先生相國風流尚未遙翩翩公子復中朝無詩堪寄忘憂館有夢常尋海鴈橋此日誰能追宋玉臨風我欲酹燕昭紫芝一接塵心盡重向終南劚藥苖題陶庵小像楊栁春風草四橋酒旗歌扇笑相邀坐中紅袖窺雙鬢眼底青山閲六朝盛事尚追桃葉渡鄉心猶繫廣陵潮頭顱如許升沈盡令僕間情付玊簫登河中郡樓從來今古亦關情況復登臨感乍生人代已隨晨雨散河山不改夕陽晴野花開遍薰風殿春鳥啼荒魏豹城日暮更聞原上笛誰能此地不沾纓蓮洋詩鈔卷四
