body:
  text: 蓮洋詩鈔卷七蒲州吳雯撰七絶杯渡渾河香象截流能徑渡其如老象沒波難却喜一杯無罅漏果然安穩出桑乾安昌絶句六首有序録二首庚申夏仲余方抱安仁之痛更涉奉倩之疾薄游安昌情思拂鬱行藥郭門輒成小詩六章觸興不一難責倫次聊存楮墨以備嵗月云爾蒲葉青青夾堰齊殘雲掠雨郭門西緑楊盡是傷心樹只遣黃鸝一箇啼半是愁中半病中傷心不為夢黃熊蔗漿難解櫻桃熱願乞仙人寶扇風感傷四絶句録三首皎皎依然明月輝寶奩塵掩事全非青鸞雙影知何處苦道瑶池使未歸惆悵零香鈿合封紅綿小繡損芙蓉綺忩拋擲誰收拾珍重當年錦線縫二十年來曉夢空蓬山弱水信難通桃花誰道三千歲難抵春歸一夜風咏南將軍事一絶嗚咽臨淮幾乞師廣張聲樂復何為燈前難忍千秋淚灑到當年斷指時咏鄴城雜事五首録一首安漢將軍安在哉七十二冢自纍纍而今碑字傳梁鵠不復重留受禪臺桃花夫人桃花夫人好顔色月中飛出雲中得新感恩仍舊感恩一傾城矣再傾國上蔡道中雪車箱搖搖秋草澀上蔡城南官路直東門極望白茫茫風前一㸃鴉翎黑初祖心影石翠巘嵯峨花雨隨孤雲片石妙難窺分明隻履西歸去五乳峯前又是誰蘇公墓下作青山送客九十里宿草傷心七百年欲拜峩嵋索靈翼正逢風雨暗長天文殊大士洗象圖頌狂象曽聞奮六牙而今馴伏捧蓮花浮幢香水慈悲甚洗盡恆河沙復沙書王平子傳後二首録一首第一聲名品目非雕忩爭脫小郎圍生平無事强人意惟有泉臺慰陸機再過渭南鴻門亭外酒旗斜半日村前水映沙三十年來重立馬鶯聲猶墜縣樓花春冰雪稜稜作歲寒而今也到早春天郭邊暖躍長河鯉門外晴開太華蓮贈謝鶴菴二首時將納姬品茶大似陸鴻漸較水還同劉伯芻紗帽籠頭煎總好仍須紅袖捧瓷甌楊柳東風柔軟條真如十五女兒腰香山居士風流甚待選雙蛾仔細描題似鶴先生畫卷三首録一首圖中亭子比休休瀑布真懸萬仞流往事都成鴻爪雪只餘墨妙古今留盧子凝兄牡丹四株有以六十千易者却之記以二首録一首世態紛紛笑不支移山伎倆久如斯因君始覺黃金賤也有銅山短氣時奉和阮翁花下飲風風雨雨道途難猶及長安花未闌便脫征衣花下醉一枝低亞玉欄干戲答豹人三首録二首日夜東風太劇顛落花無數客忩前只愁吹醒揚州夢不得髙齊自在眠彈筝莫怨白頭吟賣賦常思歸舊林不是魚竿愁决絶茂陵佳麗要黃金一片一片花飛㸃客衣纒綿珍惜不多時可憐都作關心夢忘却東風喚子規虞鄉道中口號四首千仞飛泉下石門嵐光霞彩變朝昏樵人笑指司空谷浣女方歸洗馬村紫翠紛紛入夕霞石林東去有人家木棉花落稼將熟猶見黃牛翻水車楓林颯颯石磷磷壠上饑烏飛趂人烹羔釀秫勞田父打鼓攤錢賽社神舍南舍北蔓寒瓜東門有池方漚麻老農何處牽黃犢行過一灣紅蓼花余有虞鄉口號曽寄正阮亭先生家弟來汴道及送子文絶句因謬許鄙作有黃絹之賞遂再賦此亦竊附唐人本事之意云爾入洛游梁事不齊傳來新句感幽棲山人此夜還山夢扁鵲祠東絹市西心契無為身未能柏梯山寺賺閒僧相參有句仍無句裴迪終當避右丞寄董驃騎少年使酒聞輕俠退老江干數雁羣世上可憐多醉尉不須重說李將軍戲贈李武曾二首山公愛客綺筵清燈火籠紗妒月明此日相逢未相識江南新到庾蘭成沉醉東風盧女絃泥人佳句滿題箋預愁長夜無春色遍種桃花作墓田貽永樂舊主人二首不見仙人侯道華攢攢誰食棗如瓜溪南空作七年住水鸐聲中處士家竊藥人應得藥人翻從混沌見天真無端貪作凌雲賦辜負桃花玉洞春河橋河橋新柳漸成絲社燕飛飛二月時每惜春來只為客東堂辜負好花枝咏史緘口虞針笑漢京逆鱗誰復更相攖一書諫獵千秋重不敢詞人待長卿題阮翁畫冊二首録一首慘緑深紅正滿枝雙雙蜂子趂花時更看蝴蝶車輪大只少麻姑背上騎送阮翁祭告南海四首録一首嶺氣如蒸暖不收行人都脫木棉裘陽春一路通南極直看桃花到廣州去婢怨為元彥賦二首門巷春風柳挂絲去時成恨見成悲含情脉脉兩無語回首斜陽雙淚垂朱字箜篌暗網塵傷心岐路是前因郎心若念當時意莫把金鈿與别人戴尚書竹湖州太守貧方善協律郎官老更工惟有尚書最尊寵閒中寫出葛陂龍之葛沽舟中雜詩四首録二首曉日巃嵸近直沽遙遙帆影出平蕪眼前芳草衡湘色只少春山呌鷓鴣短蒲沙帶退潮痕花裏樓臺柳外村暫歇吹簫倚雙槳閒看絲網摘河豚題孫孝堪漁父小像四首録一首藥竈茶鐺對水鷗蕭然身世兩無求釣竿雖設絲綸卷怕有蜻蜓立上頭題阮翁壬寅詩卷五首録二首緑楊芳草可憐生花下題詩野寺行江北江南烟雨路傷心重付庾蘭成姑射仙人真絶塵江山依舊墨痕新此中消息傳燈似自分當為得髓人途次偶憶洗馬村東一頃田王官谷口聼飛泉家人更有鸞臺侍便醉虞鄉絹市邉題沈漢儀小像三首時自蜀還吳録一首絶代風流酒一巵東陽才調比陳思邯鄲㑹發天人歎應見搔頭傅粉時偶讀摩詰詩感題入道悠悠悵未能蕭然興味已如僧周妻何肉兩無損只覺中年愧右丞送賈積石拌醉天涯日幾回一朝岐路悵銜杯玉蘭花發君應到新笋生時我亦來賦得海月半輪髙分十五刪四首録一首百尺樓髙玉半彎清宵無夢落潺湲錯將碧海灘頭影認作深閨鏡裏山偶興緑樹蘢葱羃曉烟城隅荷葉正田田黃鸝交語鳲鳩醉渾是江南孟夏天奉題阮翁雪溪詩思圖三首録一首墨王亭子樹丫杈詩格維摩第一家碾碎玉塵帶香色不知是雪是梅花公滸山濼别業有墨王亭周櫟園先生詩祗有墨王亭畔水空明與客憶王郎題禹尚基鴻臚卜居圖三首録一首年來百藥瘦崚嶒也似仙儒也似僧只是魚蝦都愛惜漁竿休畫畫紅藤感悼江解州辰六春首華筵重一金大寒冰雪感知音牂牁名士今何處誰辨相如作賦心四月四月湖湘芳草鋪竹枝夾岸客船孤長沙自昔傷心地親向青山聽鷓鴣江風詞四首四月江頭躑躅紅江邊愁雨又愁風泊船休近黃陵廟斑竹搖搖惱煞儂江風吹浪生白波往來舴艋衝浪過浪花起處紅衫濕換著湖州生線羅一夜南風吹不休侵晨晴日滿船頭江鄉見慣閒風雨說著風波也不愁估舶新來換寶珠船忩四角結流蘇却憐西子無緣分晚嫁黃金范大夫偶筆斆飛卿閉門閒出太匆匆小倦歸來意倍慵床上殘書風不定花鬚吹在硯池中竹嶼竹嶼灣環抱水亭鮫珠不定芰荷青阿誰輕撥蘭橈入打破春塘百子萍潭州雜詩三首潭州一住四十日親見巴帆枕上來嶽樹盡從朝雨緑湘花更著晚風開無數蜻蜓上釣竿花枝照眼水漫漫墻東尚有閒田地猶可添修鬪鴨闌方山五首録一首山色參差碧玉圍松聲花雨海濤飛晚來小坐盤陀石閒看山僧補衲衣阮翁齊啜武夷茶同令弟幔亭五首録二首幔亭峰下曾孫宴嫩莢驚雷又幾春解辨蓮花香味好端應曽是此山人大稱齊魯小邾莒更有麯生中逗撓若待伐毛三洗髓羊腸車轉蕩嫖姚題雲林秋山圖為查德尹經營慘淡意如何渺渺秋山逺逺波豈但穠花謝桃李空林黃葉亦無多臨汝道中橋下菖蒲橋上柳南風吹過緑生凉金衣公子渾相識宛轉留人到夕陽閿鄉道中望戾園思子臺前望落暉泉鳩烟樹逺微微傷心落葉哀蟬曲直到而今恨不歸題黃湄給諫紅袖烏絲卷三首白玉闌干翡翠牀林風吹動綺羅香黃門搦管妖姬侍仍是君家寶繪堂纎指玲瓏楮墨芬花前來往石榴裙蕺山扇子誰將去不解風流是右軍梅花賦就擘長箋七十鴛鴦畫裏傳比似扶風真託興後堂原未聒彭宣寄佟聞喜四首録一首鸂鶒雙雙傍暖沙野田將次有桃花即看雪後添春水流入甘泉潤萬家留别同車同三首録一首文章命逹兩難齊五十青雲路尚迷夙昔家聲原第一暫將牛鼎尚烹雞右軍書法尚矣而十七帖尤屬其最世傳少有善本西溟姜子獨有僧權不全舊搨良為至寶遂題五絶句於帖尾録四首誰言野鶩與家雞自信張芝雁陳齊續得過江書十紙神明先伏庾征西裴業貞觀入貢初烟飛霧結狀何如外人千載尤珍重不數嚴家餓𨽻書日給櫻桃子一囊山川游目樂徜徉尚平心事誰能識折柬還留種樹方懸霤山前覔紫芝樂遵滄海去無時神仙遊戲皆龍鳯多少兒孫飲墨池子文贊府得安邑後野人之賀已不受而更損絹為余强索得之戲贈二詩録一首三尺鵝溪罷剪裁處膏不潤亦竒哉從來安邑多相纍翻向先生索襪材春曉曲轆轤啞軋宫井澀花影玲瓏半簾月美人睡起梳曉鬟錦帆過處雕窗黑懷阮亭先生琅琊天下推詞伯果有文章起一時何必桐花相鄭重蕪城自有建安詩詞苑稱先生為王桐花題降龍圖香水無波道味真誰言龍性實難馴試看薄暮安禪處一箇鉢盂五百身伏虎圖一嘯驚摧山木枝腥風過處血淋漓老僧視爾渾平等正要牽來當馬騎懷子文二首録一首西出蕭關見瓦亭六盤山色六盤青懷君多在彈筝峽載筆重來驗水經子文臯蘭載筆論王母宫碑刻最詳哭張三公路之喪而送之十首録一首阻絶河山少見期神交千里只相思相逢便道參曹洞銀碗空齊大雪時君嘗簡余云此間有參洞者速來一道至則無有蓋戲余之嗜禪也獨坐看月三首録一首獨對髙旻發浩吟夜凉風露滌煩襟浮雲斂盡冰輪滿萬里青天萬古心還山坐向辰竹齊春草龍池奏賦同一年奔走日華東而今始信忘機事閒坐修篁細雨中自郟縣至南陽五日山水風土不無感慨成詩九首録一首東飛駕鵝西鴰鶬澗底菖蒲尺五長寶髻羅裙何處是青山倣佛杜蘭香送陳子厚之燕二首録一首玉溪東畔柳如絲腸斷人間折柳時寄語春風道珍重桃花山店夢斑騅寄展芝亭併謝送花樹四首録一首海棠兩株嬌可憐買須三百青銅錢暫應忍醉不沽酒換取風光二月天將再之吳門四首録三首蠻語吳歌半不知沙棠青雀影參差行人多上真娘墓酒客常留短簿祠綺户雕忩障緑紗笙囊夜半嚼紅霞不知此去長洲苑還有當年小玉家迢遞關門唱五噫那能佳麗减鄉思可憐也有凌雲筆只與吳儂較竹枝珠樓珠樓十二囓金蟾樓外春風打帽簷齊道天香何處落不知人在水晶簾閨思詞細雨茸茸楊柳津當時曾比送行人縱然不向臨卭去多恐歸來已暮春庚申仲春寄子文贊府三首時住永樂風雪薄醉閲趙帖遂書牘尾奉逹録二首松雪蘭亭跋語竒間邪規矩又誰師臨風却想翩然閣正是更闌鬬茗時疑義何人可較量風燈薄醉淨琴張病妻却上平原帖鹿脯端能逺寄將時婦病甚為陳湘殷翁題畫五首翁子姬逺姬逺子友仲持畫冊至鹿城索題録二首葦照明霞秋水平相呼相應趂和鳴同居個個無猜忌真是人間好弟兄蘆雁旅騎三冬不肯行漁陽臘雪太縱橫春來合向金鵝館消受花間一鳥鳴花鳥壁上見子文大尹題昔人抱犢三年學我亦香泉兩月停破冢不須求筆法牙籖撿出翰林經喜晤王清逺時余將還河中清逺亦之官茌平五首録三首燕許弓裘鴻漸宜相逢依舊落花時朅來重對山公席只有勞生鬢已絲曩與清逺相見年鬢俱髫齡今阮翁再命飲清逺方壯而余老矣倦游却愧長卿才二月還家花盡開最喜晴蓮千仞色清光飛過大河來余家郡城正與蓮峯相對門外朝夕見山色如碧玉握手東西長短亭翩翩家學且傳經懷君一路王孫草直到魯連村畔青清逺時方為茌山學博茌有魯連村即射書處再題喟亭看梅卷三絶句録一首人間萬事等浮雲山店溪橋野鶴羣輸却衆香緣分在梅花好處便逢君贈謝牧四首録一首蟠桃曾賜蘂珠宫五馬新看佐郡雄却羡官厨風味别金盤先薦荔枝紅除日雨霽曉起即事簡趙將軍五首録一首碧桃有意已含紫榆莢無心迥帶烟取次將窺湘女珮逡巡全放沈郎錢題黃湄都諫詩卷二首録一首十九首詩驚碧落一千年調記烟鬟少陵無語昌黎醉只許黃門到華山為阮亭先生題畫四首録二首誰畫江雲海霧閒長風披樹雨連山此中景物都何似應在衡湘上下間晴雲不及雨雲多石趾江心蕩白波卧聽鷓鴣閒不住幾番鄰舍乞漁蓑送張確山四首録一首咸陽芳草及時新偏向漁陽踏曉塵只是渭城三叠後可能忘却卷衣人送魏暗之還里二首録一首濛濛細雨海東頭尚覺寒生日本裘漸逺薊門見芳草春風吹過古并州禹州題壁四首録一首走馬襄城七聖迷禹州城外草萋萋來朝又宿嵩陽寺石壁先聽震旦雞過大鹵訪傅青主先生時已移居緬然有懷即書此寄意四首録二首松莊烟樹十年餘寺路相逢笑下驢今日重來渾不見白雲深處又移居京洛無端迫客塵也知瓔珞是前身幾時得遂東鄰約金粟園中兩道人見公㦷先生手蹟感詠之下不覺涕零四首鳴雁城南春水生陳留風俗阮家情一行書信千般思十五年前潁上行薦禰當年墨未乾傷心耆舊已凋殘孝標沒後交情少誰惜人間葛帔寒一笑金徽未落聲風流應主芙蓉城獨憐近詔求遺老不使君王見長卿等閒彌勒便同龕又與朝雲作晚參座上當年聽絲竹西州慙負哭羊曇勵夢昏昏醉夢日浮沉難處方知用力深不是梅花香色好如何鍊出廣平心題莫亞夫先生小像三首録一首補衮即是仲山甫浣墨還同王右軍比似當年蘇玉局相隨賸有兩朝雲題杜少保園時雨中過暮雨瀟瀟百一園上公别業倚雲根千回流水不知處一徑野花開到門長安初春感咏四首録二首十二金門平旦開縱橫玉勒早朝回笙歌日暮能留客誰道公孫不愛才槭械霜林少定時東風吹動隔年枝白藤書笈青絲馬獨有傷心沈亞之贈少年二十少年望麟閣盤馬彎弓氣磅礴眼前都尉知是誰雲中但看雙鵰落入晉懷長安諸公十首浪跡無端入上京也教詞賦動公卿從今好繡平原像莫更長吟瘦馬行中朝愛客推司馬龔公芝麓海內談詩仰右丞王公阮亭每憶花時留潁水劉公公㦷嘗愁雪裏送鄢陵梁公曰緝啓事歸來晝掩關論詩謂我似青蓮難忘大小歐陽體溫語時將勉後賢同里杜公振門書法率更父子紛紛詞客日相誇大雅堪憐委亂麻每怪玉遮古情性而今翻覺未聱牙汪公苕文琴酒何曽纍一官清思厚力砥狂瀾相過便覺塵心盡天半峩嵋雪後看程公石􅋯王叟顧叟致不惡屈郎李郎才亦希典型未可輕遺老投分由來有布衣陽羡書生乍相識題詩送我歸中條久無體格追風雅尚爾風華掩六朝陳其年阿大中郎舊有名相逢杯酒太匆匆郵亭數見題詩處知爾歸程過宋中彭中郎雨聲激楚清秋時讀爾從軍塞上詩四坐一時齊感激不須急難鄴中兒李天生初未相識但於阮亭先生處讀其塞上詩百韻心甚異之後聞李武曽云赴一故人難不憚數千里外倍道即至天生真異人也聚散驚心不可裁天涯雲水思悠哉何年樽酒梅花約重向昭王百尺臺客中二首録一首白藤書笈太伶俜剩有南華一卷經獨坐長吟山日曉竹忩影亂鳯凰翎希夷先生頌占斷蓮花第一峯白雲深鎖碧芙蓉石鐺半滴先天髓濂洛關閩盡得宗宿蒼陵峪谷樹蕭蕭受晚風水螢輕揚小山叢今宵秋思知多少盡付寒流亂葉中咏漢史宫簾寂寂漏聲長幾度黃門把緑囊癡絶昭陽雙燕子一心飛向定陶王見華陽道人蔣虎臣先生壁上和女郎詩題其後三首聞道華陽句曲仙布衣粗糲學枯禪如何也有閒情賦寫到青樓燕子邉詩中用關盼盼事看著名山杖古藤蒲團夜坐冷如冰只今綺語留金粉尚爾天花著定僧曾與芭蕉作晚參三生慧業入瞿曇老來劍閣無消息重向峨嵋掃舊龕鎮州荷花鎮州荷花一萬柄鵁鶄鸂鶒相爭飛安得紅香最深處玉簫載滿酒船歸城南城北皆荷花正對城門是酒家下馬猶能再斟酌醉臨明鏡看吳娃上谷早發上谷東來曉氣濃沿溪烟樹緑含風郎山插笏青冥裏大似諸郎立雨中匏齊黃葵同方山紫海兩先生作二首録一首日日城西便忘歸北忩秋色雜晴暉坐看五叠湘裙軟賤煞人間羅綺衣班媫妤翠輦當年著意辭何曾團扇更尋思一從長信宫中去總使秋風也不悲逢趙秋谷太史三首録二首大庾梅花發古香羅浮山下足徜徉菖蒲九節親能斸好馭仙人五色羊廣州歷罷又蘇州也向真娘墓上游饒爾廣平心似鐵眼波橫處易悲秋題沈澗房射鴨圖三首録一首腰腹未作東陽瘦凍吟豈便東野窮愛對浪花酌銅斗不妨料理竹枝弓次青霞韻三首録二首生平恩怨任茫茫只有名心尚不忘百軸雄文詩兩卷白藤隨處發竒光白鹿騎來任往還城南劇飲發朱顔三千玉女渾相待又采菖蒲入華山山行即事三首録二首燕子烏衣雉子斑黃牛䑛犢水牛閒迎人無限挼藍色布榖聲中四月山山雲結作盤龍髻水荇花開似寶簮妾自當壚郎自飲從來不解鳳凰琴蓮洋詩鈔卷七
